name: Deploy Dino IA

on:
  push:
    branches:
      - main  # Se a sua branch principal for 'master', troque para master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inserir Chave Gemini no Código
        run: |
          # Esse comando procura por __GEMINI_KEYS__ e troca pela chave que você salvou no Secret
          sed -i "s/__GEMINI_KEYS__/${{ secrets.GEMINI_KEYS }}/g" index.html

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages  # O site será publicado nesta branch automática
          
