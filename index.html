async function sbGet(table, filters) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?select=*";
  for (const [k,v] of Object.entries(filters||{})) url += "&" + k + "=eq." + encodeURIComponent(v);
  return (await fetch(url, { headers: SB_H })).json();
}
async function sbUpdate(table, match, data) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?";
  for (const [k,v] of Object.entries(match)) url += k + "=eq." + encodeURIComponent(v) + "&";
  return (await fetch(url, { method:"PATCH", headers:{...SB_H, Prefer:"return=representation"}, body:JSON.stringify(data) })).json();
}
async function sbInsert(table, data) {
  return (await fetch(SUPABASE_URL + "/rest/v1/" + table, { method:"POST", headers:{...SB_H, Prefer:"return=representation"}, body:JSON.stringify(data) })).json();
}

// ── ESTADO ──
let historico       = [];
let ocupado         = false;
let pendente        = null;   // pagamento aguardando confirmacao
let pendenteSug     = null;   // sugestoes fuzzy aguardando escolha
let clientesCache   = null;

// ── STORAGE LOCAL (20 dias) ──
const STORAGE_KEY = "dino_chat_v1";
const DIAS_SALVAR = 20;
let   msgsSalvas  = [];   // [{role, texto, time, toast}]
let   restaurando = false;

function salvarLocal() {
  if (restaurando) return;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      ts: Date.now(),
      historico,
      msgs: msgsSalvas
    }));
  } catch(e) {}
}

function carregarLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const dados = JSON.parse(raw);
    if (!dados.ts || Date.now() - dados.ts > DIAS_SALVAR * 86400000) {
      localStorage.removeItem(STORAGE_KEY);
      return false;
    }
    historico = dados.historico || [];
    msgsSalvas = dados.msgs || [];
    restaurando = true;
    for (const m of (dados.msgs || [])) {
      if (m.toast) addToast(m.texto, m.pagData || null);
      else {
        addMsg(m.role, m.texto, false, m.time);
        if (m.cancelado) {
          const bubbles = document.querySelectorAll(".bubble.bot");
          const last = bubbles[bubbles.length - 1];
          if (last) {
            const span = document.createElement("span");

            span.style.cssText = "display:block;color:#f87171;font-size:11px;margin-top:6px;";

    }

}

}


async function carregarClientes() {
  if (clientesCache) return clientesCache;
  const data = await sbGet("clientes");
  clientesCache = Array.isArray(data) ? data : [];
  return clientesCache;
}

function normStr(s) {
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

// Similaridade entre dois nomes (0 a 1)
function sim(a, b) {
  a = normStr(a); b = normStr(b);
  if (a === b) return 1;
  const pa = a.split(" ")[0], pb = b.split(" ")[0];
  if (pa === pb) return 0.95;
  if (b.includes(a) || a.includes(b)) return 0.9;
  // letras em comum no primeiro nome
  let comum = 0;
  for (const ch of pa) { if (pb.includes(ch)) comum++; }
  return comum / Math.max(pa.length, pb.length, 1);
}

// Retorna { exato:true, cliente } ou { exato:false, sugestoes:[] } ou null
function encontrarCliente(clientes, nome) {
  const n = normStr(nome);
  const norm = s => normStr(s);
  let c = clientes.find(x => norm(x.name) === n);
  if (c) return { exato:true, cliente:c };
  c = clientes.find(x => norm(x.name).startsWith(n));
  if (c) return { exato:true, cliente:c };
  c = clientes.find(x => norm(x.name).includes(n));
  if (c) return { exato:true, cliente:c };
  // fuzzy
  const ranked = clientes
    .map(x => ({ cliente:x, score:sim(nome, x.name) }))
    .filter(x => x.score >= 0.5)
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);
  if (ranked.length) return { exato:false, sugestoes:ranked.map(x=>x.cliente) };
  return null;
}

// ── PAGAMENTO (identico ao ADM) ──
async function executarPagamento(phone, val) {
  const dados = await sbGet("clientes", { phone });
  const c = Array.isArray(dados) ? dados[0] : null;
  if (!c) throw new Error("Cliente nao encontrado.");

  const novoSaldo = Number(c.debt||0) - val;
  const [cfgTk, cfgDi] = await Promise.all([
    sbGet("configs", { key:"ticket_valor_reais" }),
    sbGet("configs", { key:"diamante_valor_reais" }),
  ]);
  const vTk = cfgTk[0]?.value ? Number(cfgTk[0].value) : 0;
  const vDi = cfgDi[0]?.value ? Number(cfgDi[0].value) : 0;
  const acum   = Number(c.total_acumulado||0) + val;
  const novTk  = vTk > 0 ? Math.floor(acum / vTk) : 0;
  const sobra  = vTk > 0 ? acum % vTk : acum;
  const novDi  = vDi > 0 ? Math.floor(val / vDi) : 0;

  await sbUpdate("clientes", { phone }, {
    debt:            novoSaldo,
    tickets:         (Number(c.tickets||0))   + novTk,
    diamantes:       (Number(c.diamantes||0)) + novDi,
    total_acumulado: sobra,
  });

  const dh = dataHoraSP();
  const saldoTexto = novoSaldo > 0
    ? "Saldo devedor restante: R$ " + novoSaldo.toFixed(2).replace(".",",")
    : novoSaldo < 0
      ? "Credito a favor: R$ " + Math.abs(novoSaldo).toFixed(2).replace(".",",")
      : "Quitado";

  const miolo = "──────────────────\nCliente: " + c.name + "\nData/Hora: " + dh + "\nValor pago: R$ " + val.toFixed(2).replace(".",",") + "\n" + saldoTexto + "\n──────────────────";
  await sbInsert("notificacoes", { customer_phone:phone, tipo:"pagamento", valor:val, comprovante:miolo });

}

async function confirmarPendente() {
  if (!pendente) return;
  document.querySelectorAll(".confirm-btns").forEach(el => el.remove());
  const { cliente, valor, zerarCredito } = pendente;
  pendente = null;
  setStatus(true);
  document.getElementById("typing").style.display = "flex";
  rolar();
  try {
    if (zerarCredito) {
      await sbUpdate("clientes", { phone: cliente.phone }, { debt: 0 });
      clientesCache = null;
      document.getElementById("typing").style.display = "none";
      addToast("✅ Crédito zerado ♻️");
      historico.push({ role:"assistant", content:"Crédito zerado." });
    } else {
      const res = await executarPagamento(cliente.phone, valor);
      document.getElementById("typing").style.display = "none";
      let toast;
      if (res.novoSaldo > 0)      toast = "✅ Dívida atualizada para R$ " + res.novoSaldo.toFixed(2).replace(".",",");
      else if (res.novoSaldo < 0) toast = "✅ Crédito a favor R$ " + Math.abs(res.novoSaldo).toFixed(2).replace(".",",");
      else                        toast = "✅ Quitado ♻️";
      if (res.novTk > 0) toast += "  +" + res.novTk + " 🎟️";
      if (res.novDi > 0) toast += " +" + res.novDi + " 💎";
      addToast(toast, { phone: cliente.phone, nome: res.nome, valor, novoSaldo: res.novoSaldo, novTk: res.novTk, novDi: res.novDi });
      historico.push({ role:"assistant", content:toast });
    }
  } catch(e) {
    document.getElementById("typing").style.display = "none";
    addMsg("bot", "Erro: " + e.message);
  } finally {
    setStatus(false);
    ocupado = false;
  }
}

function cancelarPendente() {
  const btns = document.querySelectorAll(".confirm-btns");
  btns.forEach(el => {
    const span = document.createElement("span");
    span.textContent = "Cancelado";
    span.style.cssText = "display:block;color:#f87171;font-size:11px;margin-top:6px;";

// ── IA ──
async function detectarIntencao(texto) {
  const system = `Voce e Lara, assistente do sistema "O Rei da Coxinha".
Sua funcao e identificar pagamentos/quitacoes e consultas de saldo de clientes.
Responda SOMENTE com JSON puro, sem markdown, sem explicacao.
Se for pagamento ou quitacao: {"acao":"pagamento","cliente":"NOME","valor":NUMERO}
Se valor nao mencionado ou for "zero/zerar/quitar/quitado", use 0: {"acao":"pagamento","cliente":"NOME","valor":0}
Se for consulta de saldo/divida/informacoes/dados de UM cliente especifico: {"acao":"consulta","cliente":"NOME"} — use o nome do historico se nao mencionar nome novo.
Se for pedido para listar TODOS os clientes com divida/debito/duvida (sem citar nome especifico de pessoa), ou pergunta sobre dividas/duvidas de clientes no geral: {"acao":"lista_devedores"}
Se for pedido para listar TODOS os clientes com credito/saldo positivo (sem citar nome especifico): {"acao":"lista_credores"}
Se nao for nenhuma das opcoes acima: {"acao":"outro","resposta":"resposta amigavel curta"}
IMPORTANTE: o campo "cliente" deve ser SEMPRE um nome de pessoa real. NUNCA coloque frases ou textos longos no campo "cliente".
IMPORTANTE: palavras com erro de digitacao ou voz devem ser interpretadas pelo contexto. "divida", "duvida", "devida" = divida. "crente", "cliente", "clente" = cliente. "credito", "creditu" = credito.
Exemplos de pagamento: "Jefferson pagou 50", "maria 30 reais", "joao pagou", "lanca 25 do pedro", "quita a divida do carlos", "zera o saldo da ana", "jefferson quitado"
Exemplos de consulta: "qual a divida do Jefferson", "quanto a Maria deve", "qual o saldo dele", "me fala do joao"
Exemplos de lista_devedores: "quais clientes tem divida", "quem deve", "lista os devedores", "todos os clientes", "qual os clientes que tem divida", "quais tem debito", "na frente com divida", "quem esta com duvida", "quem esta devendo", "me fala de todos os clientes", "qual as duvidas", "qual as duvidas dos clientes", "quanto o cliente ta devendo", "quando os clientes deve", "quais as dividas", "me mostra as dividas", "os clientes devendo", "quanto os clientes devem", "qual a divida dos clientes", "mostre os devedores", "clientes com divida", "quem tem divida", "as duvidas dos clientes", "qual cliente deve"
Exemplos de lista_credores: "quais clientes tem credito", "quem tem saldo positivo", "qual crente com credito", "quem esta com credito", "lista os que tem credito", "quem tem saldo a favor"`;

  for (const modelo of MODELOS) {
    try {
      const res = await fetch(GROQ_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer " + GROQ_KEY},
        body:JSON.stringify({ model:modelo, messages:[{role:"system",content:system},...historico.slice(-6),{role:"user",content:texto}], temperature:0.1, max_tokens:150 })
      });
      const json = await res.json();
      if (!res.ok) continue;
      const raw = json.choices?.[0]?.message?.content || "";
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        const parsed = JSON.parse(match[0]);
        if (parsed.cliente && parsed.cliente.length > 40) {
          return { acao:"outro", resposta:"Nao entendi. Pode informar o nome do cliente?" };
        }
        return parsed;
      }
    } catch(e) { continue; }
  }
  return { acao:"outro", resposta:"Nao consegui processar. Tente novamente." };
}

// ── VERIFICAR SE RESPOSTA E ESCOLHA DE SUGESTAO ──
function resolverSugestao(texto, sugestoes) {
  const t = normStr(texto);
  // escolha por numero
  const num = parseInt(texto.trim());
  if (!isNaN(num) && num >= 1 && num <= sugestoes.length) return sugestoes[num-1];
  // escolha por nome
  for (const s of sugestoes) {
    if (normStr(s.name).includes(t) || t.includes(normStr(s.name.split(" ")[0]))) return s;
  }
  // confirmacao generica: sim, isso, ele, esse, etc
  if (/^(sim|isso|ele|essa|esse|s|yes|confirma|pode)/.test(t)) return sugestoes[0];
  return null;
}

async function processarTexto(texto) {
  // Se tinha sugestoes pendentes, verifica se usuario escolheu
  if (pendenteSug) {
    const escolha = resolverSugestao(texto, pendenteSug.sugestoes);
    if (escolha) {
      const valor = pendenteSug.valor;
      pendenteSug = null;
      const debtAtual = Number(escolha.debt||0);
      const valorFinal = (!valor || valor <= 0) ? debtAtual : valor;
      if (debtAtual < 0 && valorFinal <= 0) {
        const creditoFmt = "R$ " + Math.abs(debtAtual).toFixed(2).replace(".",",");
        const msg = escolha.name + " está com " + creditoFmt + " de crédito. Quer zerar a conta?";
        pendente = { cliente:escolha, valor:0, zerarCredito:true };
        addMsg("bot", msg, true);
        historico.push({ role:"assistant", content:msg });
        ocupado = true;
        return;
      }
      if (valorFinal <= 0) {
        addMsg("bot", escolha.name + " não tem débito em aberto.");
        return;
      }
      const novoSaldo = debtAtual - valorFinal;
      const saldoDepois = novoSaldo > 0 ? "Saldo apos: R$ " + novoSaldo.toFixed(2).replace(".",",") : novoSaldo < 0 ? "Credito apos: R$ " + Math.abs(novoSaldo).toFixed(2).replace(".",",") : "Conta quitada";
      pendente = { cliente:escolha, valor:valorFinal };
      const msg = "Confirmar pagamento?\n\n" + escolha.name + "\nValor: R$ " + valorFinal.toFixed(2).replace(".",",") + "\nDebito atual: R$ " + debtAtual.toFixed(2).replace(".",",") + "\n" + saldoDepois;
      addMsg("bot", msg, true);
      historico.push({ role:"assistant", content:msg });
      ocupado = true;
      return;
    } else {
      // Nao reconheceu escolha — cancela sugestao e reprocessa como nova mensagem
      pendenteSug = null;
      addMsg("bot", "Ok, entendido.");
      historico.push({ role:"assistant", content:"Ok, entendido." });
      // cai no fluxo normal abaixo (nao retorna)
    }
  }

  if (ocupado) {
    document.getElementById("typing").style.display = "none";
    return;
  }
  ocupado = true;
  setStatus(true);
  document.getElementById("typing").style.display = "flex";
  rolar();

  try {
    const intencao = await detectarIntencao(texto);

    if (intencao.acao === "pagamento") {
      const clientes = await carregarClientes();
      const resultado = encontrarCliente(clientes, intencao.cliente || "");
      const valor = Number(intencao.valor) || 0;

      if (!resultado) {
        const resp = "Nao encontrei nenhum cliente com o nome \"" + intencao.cliente + "\". Verifique o nome e tente novamente.";
        document.getElementById("typing").style.display = "none";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      // Fuzzy — mostra sugestoes
      if (!resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const resp = "Nao achei \"" + intencao.cliente + "\" exato. Voce quis dizer?\n\n" + lista + "\n\nResponda com o nome ou numero.";
        document.getElementById("typing").style.display = "none";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        pendenteSug = { sugestoes:resultado.sugestoes, valor };
        ocupado = false; setStatus(false);
        return;
      }

      // Achou exato
      const cliente = resultado.cliente;
      const debtAtual = Number(cliente.debt||0);
      const valorFinal = (!valor || valor <= 0) ? debtAtual : valor;

      // Cliente tem crédito (saldo negativo) — perguntar se quer zerar
      if (debtAtual < 0 && valorFinal <= 0) {
        const creditoFmt = "R$ " + Math.abs(debtAtual).toFixed(2).replace(".",",");
        const msg = cliente.name + " está com " + creditoFmt + " de crédito. Quer zerar a conta?";
        pendente = { cliente, valor:0, zerarCredito:true };
        document.getElementById("typing").style.display = "none";
        addMsg("bot", msg, true);
        historico.push({ role:"assistant", content:msg });
        return;
      }

      if (valorFinal <= 0) {
        const resp = cliente.name + " não tem débito em aberto.";
        document.getElementById("typing").style.display = "none";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      const novoSaldo = debtAtual - valorFinal;
      const saldoDepois = novoSaldo > 0 ? "Saldo apos: R$ " + novoSaldo.toFixed(2).replace(".",",") : novoSaldo < 0 ? "Credito apos: R$ " + Math.abs(novoSaldo).toFixed(2).replace(".",",") : "Conta quitada";
      pendente = { cliente, valor:valorFinal };
      document.getElementById("typing").style.display = "none";
      const msg = "Confirmar pagamento?\n\n" + cliente.name + "\nValor: R$ " + valorFinal.toFixed(2).replace(".",",") + "\nDebito atual: R$ " + debtAtual.toFixed(2).replace(".",",") + "\n" + saldoDepois;
      addMsg("bot", msg, true);
      historico.push({ role:"assistant", content:msg });
      // ocupado = true ate confirmar/cancelar

    } else if (intencao.acao === "consulta") {
      const clientes = await carregarClientes();
      const nomeQuery = intencao.cliente || "";
      const resultado = nomeQuery ? encontrarCliente(clientes, nomeQuery) : null;
      document.getElementById("typing").style.display = "none";

      if (!resultado) {
        const resp = nomeQuery
          ? "Nao encontrei nenhum cliente com o nome \"" + nomeQuery + "\"."
          : "Pode me dizer o nome do cliente?";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      if (!resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const resp = "Nao achei \"" + nomeQuery + "\" exato. Voce quis dizer?\n\n" + lista + "\n\nResponda com o nome ou numero.";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        pendenteSug = { sugestoes:resultado.sugestoes, valor:0 };
        ocupado = false; setStatus(false);
        return;
      }

      const c = resultado.cliente;
      const debt = Number(c.debt||0);
      const saldoLinha = debt > 0
        ? "Debito: R$ " + debt.toFixed(2).replace(".",",")
        : debt < 0
          ? "Credito: R$ " + Math.abs(debt).toFixed(2).replace(".",",")
          : "Sem debito";
      const resp = c.name + "\n" + saldoLinha + "\nTickets: " + (c.tickets||0) + "  Diamantes: " + (c.diamantes||0);
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);

    } else if (intencao.acao === "lista_devedores") {
      const clientes = await carregarClientes();
      const lista = clientes
        .filter(c => Number(c.debt||0) > 0)
        .sort((a,b) => Number(b.debt) - Number(a.debt));
      document.getElementById("typing").style.display = "none";
      let resp;
      if (!lista.length) {
        resp = "Nenhum cliente com dívida no momento! 🎉";
      } else {
        resp = "Clientes com dívida (" + lista.length + "):\n\n" +
          lista.map((c,i) => (i+1) + ". " + c.name + " — R$ " + Number(c.debt).toFixed(2).replace(".",",")).join("\n");
      }
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);

    } else if (intencao.acao === "lista_credores") {
      const clientes = await carregarClientes();
      const lista = clientes
        .filter(c => Number(c.debt||0) < 0)
        .sort((a,b) => Number(a.debt) - Number(b.debt));
      document.getElementById("typing").style.display = "none";
      let resp;
      if (!lista.length) {
        resp = "Nenhum cliente com crédito no momento.";
      } else {
        resp = "Clientes com crédito (" + lista.length + "):\n\n" +
          lista.map((c,i) => (i+1) + ". " + c.name + " — R$ " + Math.abs(Number(c.debt)).toFixed(2).replace(".",",")).join("\n");
      }
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);

    } else {
      document.getElementById("typing").style.display = "none";
      const resp = intencao.resposta || "Como posso ajudar?";
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);
    }

  } catch(e) {
    document.getElementById("typing").style.display = "none";
    addMsg("bot", "Erro: " + e.message);
    ocupado = false; setStatus(false);
  }
}

let mediaRecorder = null;
let audioChunks = [];
let recTimerInterval = null;
let recSeconds = 0;
let micLocked = false;
let micPressTimer = null;
let micStartY = 0;
let micStartX = 0;
let micCancelled = false;

const sendBtn = document.getElementById("send-btn");
const recBar  = document.getElementById("rec-bar");

function atualizarBtn() {

    sendBtn.innerHTML = "&#x27A4;";

document.getElementById("msg-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});


// Iniciar gravação
async function iniciarGravacao() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    micCancelled = false;
    micLocked = false;
    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm";
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      if (!micCancelled && audioChunks.length) enviarAudio();
    };
    mediaRecorder.start(100);
    // UI
    recSeconds = 0;
    recBar.classList.add("show");
    document.getElementById("input-bar").style.visibility = "hidden";
    sendBtn.classList.add("recording");
    sendBtn.innerHTML = "🎙️";
    lockPanel.classList.add("show");
    recTimerInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds/60);
      const s = String(recSeconds%60).padStart(2,"0");
      const txt = m + ":" + s;
      document.getElementById("rec-timer").textContent = txt;
      document.getElementById("rec-locked-timer").textContent = txt;
    }, 1000);
  } catch(e) {
    alert("Permissão de microfone negada ou indisponível.");
  }
}

function pararGravacao(cancelar) {
  if (!mediaRecorder || mediaRecorder.state === "inactive") return;
  clearInterval(recTimerInterval);
  micCancelled = !!cancelar;
  recBar.classList.remove("show");
  lockPanel.classList.remove("show");
  document.getElementById("input-bar").style.visibility = "visible";
  // Restaura rec-bar ao estado original
  document.getElementById("rec-wave").style.display = "";
  document.getElementById("slide-hint").style.display = "";
  document.getElementById("rec-send").style.display = "none";
  sendBtn.classList.remove("recording","mic-lock","active");
  sendBtn.innerHTML = "🎙️";
  micLocked = false;
  mediaRecorder.stop();
}

function cancelarGravacao() { pararGravacao(true); }

async function enviarAudio() {
  if (recSeconds < 1 || audioChunks.length === 0) return; // ignora gravações vazias
  const blob = new Blob(audioChunks, { type: audioChunks[0]?.type || "audio/webm" });
  const dur  = recSeconds;
  transcribeAndSend(blob, dur);
}

function addAudioMsg(url, durSec) {
  const t = agora();
  const m = Math.floor(durSec/60), s = String(durSec%60).padStart(2,"0");
  const durTxt = m + ":" + s;
  const row = document.createElement("div");
  row.className = "msg-row user";
  // Waveform canvas placeholder bars
  const bars = Array.from({length:28}, (_,i) => {
    const h = 4 + Math.abs(Math.sin(i*0.7))*18;
    return `<rect x="${i*6}" y="${(28-h)/2}" width="3" height="${h}" rx="1.5" fill="rgba(255,255,255,0.6)"/>`;
  }).join("");
  row.innerHTML = `<div class="bubble user">
    <span class="bubble-meta-wrap"><span class="bubble-time">${t}</span><span class="bubble-check">&#x2713;&#x2713;</span></span>
    <div class="audio-bubble">
      <button class="audio-play" onclick="toggleAudio(this,'${url}')">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <svg class="audio-waveform" viewBox="0 0 168 28" xmlns="http://www.w3.org/2000/svg">${bars}</svg>
      <span class="audio-dur">${durTxt}</span>
    </div>
  </div>`;
  msgs().insertBefore(row, document.getElementById("typing"));
  rolar();
  if (!restaurando) { msgsSalvas.push({role:"user", texto:"🎙️ Áudio ("+durTxt+")", time:t}); salvarLocal(); }
}

let currentAudio = null;
function toggleAudio(btn, url) {
  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="#fff" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>';
    return;
  }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.play();
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="#fff" width="14" height="14"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  currentAudio.onended = () => {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="#fff" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>';
  };
}

async function transcribeAndSend(blob, dur) {
  // Tenta transcrever via Groq Whisper
  ocupado = true; setStatus(true);
  document.getElementById("typing").style.display = "flex"; rolar();
  const limpar = () => {
    document.getElementById("typing").style.display = "none";
    ocupado = false; setStatus(false);
  };
  try {
    const fd = new FormData();
    fd.append("file", blob, "audio.webm");
    fd.append("model", "whisper-large-v3");
    fd.append("language", "pt");
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000); // 15s timeout
    const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
      method:"POST",
      headers:{ Authorization:"Bearer " + GROQ_KEY },
      body: fd,
      signal: controller.signal
    });
    clearTimeout(timeout);
    if (!res.ok) {
      limpar();
      addMsg("bot", "Erro ao transcrever o áudio (status " + res.status + "). Tente digitar.");
      return;
    }
    const json = await res.json();
    const texto = json.text?.trim();
    if (!texto || texto.length < 2) { limpar(); return; }
    // Whisper alucina frases de silencio — ignora se for ruido conhecido
    const ALUCINACOES = /^(obrigado|obrigada|legendas?|legenda por|tchau|flw|silence|\[music\]|\(music\)|thank you|thanks|\.\.\.)[\.!,\s]*$/i;
    if (ALUCINACOES.test(texto) && recSeconds < 3) { limpar(); return; }
    addMsg("user", texto);
    historico.push({ role:"user", content: texto });
    await processarTexto(texto);
  } catch(e) {
    limpar();
    const msg = e.name === "AbortError"
      ? "Tempo esgotado ao transcrever o áudio. Verifique sua conexão ou tente digitar."
      : "Não consegui transcrever o áudio. Tente digitar.";
    addMsg("bot", msg);
  }
}

// ── EVENTOS DO BOTÃO MIC (press & hold / slide up to lock) ──
function onMicDown(e) {
  const hasText = document.getElementById("msg-input").value.trim().length > 0;
  if (hasText) { enviar(); return; }
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  micStartY = pt.clientY;
  micStartX = pt.clientX;
  micPressTimer = setTimeout(() => { iniciarGravacao(); }, 150);
}

function onMicMove(e) {
  if (!mediaRecorder || mediaRecorder.state !== "recording") return;
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  const dy = micStartY - pt.clientY;
  const dx = micStartX - pt.clientX;
  // Slide para cima → travar
  if (dy > 60 && !micLocked) {
    micLocked = true;
    // Mantém rec-bar mas transforma no modo travado
    document.getElementById("rec-wave").style.display = "none";
    document.getElementById("slide-hint").style.display = "none";
    document.getElementById("rec-send").style.display = "flex";
    lockPanel.classList.remove("show");
  }
  // Slide para esquerda → cancelar
  if (dx > 120 && !micLocked) {
    pararGravacao(true);
  }
}

function onMicUp(e) {
  clearTimeout(micPressTimer);
  if (!mediaRecorder || mediaRecorder.state !== "recording") return;
  if (!micLocked) pararGravacao(false); // envia
}

// Touch events
sendBtn.addEventListener("touchstart", onMicDown, { passive: false });
sendBtn.addEventListener("touchmove",  onMicMove,  { passive: false });
sendBtn.addEventListener("touchend",   onMicUp,    { passive: false });
// Mouse events (desktop)
sendBtn.addEventListener("mousedown", onMicDown);
document.addEventListener("mousemove", e => { if (mediaRecorder && mediaRecorder.state==="recording") onMicMove(e); });
document.addEventListener("mouseup",   e => { clearTimeout(micPressTimer); if (mediaRecorder && mediaRecorder.state==="recording" && !micLocked) pararGravacao(false); });

// Click quando travado → enviar; quando texto → enviar
sendBtn.addEventListener("click", () => {
  if (micLocked) { pararGravacao(false); return; }
  if (sendBtn.classList.contains("active")) enviar();
});

document.getElementById("datePill").textContent = new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"}).toUpperCase();

setTimeout(() => {
  const restaurado = carregarLocal();
  if (!restaurado) {
    addMsg("bot", "Ola! Sou o 𝕕𝕚𝕟𝕠 𝕚𝕒.\n\nPor enquanto processo pagamentos.\n\nExemplos:\n- Jefferson pagou 50\n- Maria pagou\n- Lanca 25 do Joao");
  }
  setTimeout(() => document.getElementById("msg-input").focus(), 100);
}, 400);
</script>
