<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>𝕕𝕚𝕟𝕠 𝕚.𝕒</title>
<meta name="theme-color" content="#0B141A">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #0B141A; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Roboto, 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; }
  #app { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; position: relative; background: #0B141A; }
  #header { background: #111B21; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2A3942; flex-shrink: 0; z-index: 10; }
  .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #c75b24, #8B3E17); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; position: relative; }
  .status-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; border-radius: 50%; background: #25D366; border: 2px solid #111B21; transition: background 0.3s; }
  .header-info { flex: 1; }
  .header-name { color: #E9EDEF; font-weight: 600; font-size: 15px; }
  .header-status { color: #25D366; font-size: 12px; }
  #wallpaper { position: absolute; inset: 61px 0 64px; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; position: relative; z-index: 1; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #2A3942; border-radius: 4px; }
  .date-pill { display: flex; justify-content: center; margin: 6px 0 8px; }
  .date-pill span { background: #1E2D36; border-radius: 8px; padding: 4px 10px; color: #8696A0; font-size: 11.5px; }
  .msg-row { display: flex; align-items: flex-end; margin-bottom: 2px; animation: fadeUp .18s ease; }
  .msg-row.user { justify-content: flex-end; padding-left: 52px; padding-right: 8px; }
  .msg-row.bot  { justify-content: flex-start; padding-right: 52px; padding-left: 8px; }
  .bubble { padding: 6px 7px 4px 9px; max-width: 100%; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,.36); word-wrap: break-word; }
  .bubble.bot  { background: #202C33; border-radius: 0 7.5px 7.5px 7.5px; }
  .bubble.bot::before { content: ""; position: absolute; top: 0; left: -8px; border-style: solid; border-width: 0 9px 9px 0; border-color: transparent #202C33 transparent transparent; }
  .bubble.user { background: #005C4B; border-radius: 7.5px 0 7.5px 7.5px; }
  .bubble.user::after { content: ""; position: absolute; top: 0; right: -8px; border-style: solid; border-width: 9px 9px 0 0; border-color: #005C4B transparent transparent transparent; }
  .bubble-text { color: #E9EDEF; font-size: 15px; line-height: 21px; word-break: break-word; white-space: pre-wrap; }
  .bubble-meta-wrap { display: flex; align-items: flex-end; justify-content: flex-end; float: right; margin-left: 6px; margin-bottom: -3px; margin-top: 1px; gap: 2px; white-space: nowrap; }
  .bubble-time  { color: rgba(134,150,160,.9); font-size: 11px; line-height: 15px; }
  .bubble-check { color: #53BDEB; font-size: 14px; line-height: 14px; }
  .confirm-btns { display: flex; gap: 8px; margin-top: 10px; }
  .confirm-btns button { flex: 1; padding: 9px; border: none; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-confirmar { background: #25D366; color: white; }
  .btn-cancelar  { background: #3D4A50; color: #E9EDEF; }
  #typing { display: none; align-items: flex-end; gap: 5px; margin: 2px 0 4px; padding-left: 8px; }
  .typing-bubble { background: #202C33; border-radius: 0 7.5px 7.5px 7.5px; padding: 9px 14px; display: flex; gap: 4px; align-items: center; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,.36); }
  .typing-bubble::before { content:""; position:absolute; top:0; left:-8px; border-style:solid; border-width:0 9px 9px 0; border-color:transparent #202C33 transparent transparent; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #8696A0; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  #input-bar { background: #0B141A; padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; z-index: 10; }
  #input-wrap { flex: 1; display: flex; align-items: flex-end; background: #202C33; border-radius: 24px; padding: 6px 14px; gap: 8px; min-height: 44px; }
  #msg-input { flex: 1; background: transparent; border: none; outline: none; color: #E9EDEF; font-size: 15px; padding: 4px 0; font-family: inherit; resize: none; max-height: 120px; overflow-y: auto; line-height: 21px; }
  #msg-input::placeholder { color: #8696A0; }
  #send-btn { width: 48px; height: 48px; border-radius: 50%; background: #00A884; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; color: #fff; user-select: none; -webkit-user-select: none; }
  #mic-btn { width: 48px; height: 48px; border-radius: 50%; background: #202C33; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; color: #8696A0; user-select: none; -webkit-user-select: none; transition: background .15s, color .15s; }
  #mic-btn.gravando { background: #c0392b; color: #fff; animation: micPulse .8s infinite; }
  @keyframes micPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  .toast-row { display:flex; justify-content:center; margin: 4px 8px 6px; animation: fadeUp .18s ease; }
  .toast-pill { background: rgba(22,101,52,0.35); border: 1.5px solid #16a34a; border-radius: 14px; padding: 9px 16px; color: #4ade80; font-size: 14.5px; font-weight: 500; text-align:center; line-height:1.4; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
  .toast-clicavel { cursor: pointer; transition: background .15s, transform .1s; }
  .toast-clicavel:active { background: rgba(22,101,52,0.6); transform: scale(0.97); }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
  #chips { display:flex; gap:6px; padding: 4px 10px 0; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
  #chips::-webkit-scrollbar { display:none; }
  .chip { background:#1E2D36; border:1px solid #2A3942; border-radius:16px; padding:5px 12px; color:#A8B8C0; font-size:13px; white-space:nowrap; cursor:pointer; user-select:none; -webkit-user-select:none; flex-shrink:0; transition: background .15s, color .1s; }
  .chip:active { background:#2A3942; color:#E9EDEF; }

  /* ── ENGRENAGEM ── */
  #gear-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; justify-content:center; color:#8696A0; flex-shrink:0; transition: color .2s, transform .3s; }
  #gear-btn:active { color:#E9EDEF; transform: rotate(60deg); }

  /* ── MODAL CONFIGURAÇÕES ── */
  #cfg-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; justify-content:center; align-items:flex-end; }
  #cfg-overlay.open { display:flex; }
  #cfg-box { background:#111B21; border-radius:18px 18px 0 0; width:100%; max-width:480px; padding:20px 20px 36px; animation: slideUp .22s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  #cfg-box h2 { color:#E9EDEF; font-size:16px; font-weight:700; margin-bottom:6px; }
  #cfg-box p  { color:#8696A0; font-size:12px; margin-bottom:16px; }
  .cfg-section-title { color:#8696A0; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; margin-top:4px; }
  .key-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:20px; }
  .key-num { background:#1E2D36; border:1.5px solid #2A3942; border-radius:10px; padding:10px 4px; color:#8696A0; font-size:14px; font-weight:700; text-align:center; cursor:pointer; transition: all .15s; user-select:none; -webkit-user-select:none; }
  .key-num.active { background:#0d2e1e; border-color:#25D366; color:#25D366; }
  .key-num:active { transform:scale(.93); }
  #cfg-close { width:100%; padding:13px; background:#1E2D36; border:none; border-radius:12px; color:#E9EDEF; font-size:15px; font-weight:600; cursor:pointer; margin-top:4px; }
  #cfg-close:active { background:#2A3942; }
  .model-list { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
  .model-item { background:#1E2D36; border:1.5px solid #2A3942; border-radius:10px; padding:10px 14px; color:#8696A0; font-size:13px; cursor:pointer; transition: all .15s; user-select:none; -webkit-user-select:none; }
  .model-item.active { background:#0d2e1e; border-color:#25D366; color:#25D366; font-weight:600; }
  .model-item:active { transform:scale(.98); }

  /* ── MODAL PEDIDO ── */
  #pedido-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; justify-content:center; align-items:flex-end; }
  #pedido-overlay.open { display:flex; }
  #pedido-box { background:#111B21; border-radius:18px 18px 0 0; width:100%; max-width:480px; max-height:85dvh; display:flex; flex-direction:column; animation: slideUp .22s ease; }
  #pedido-header { padding:16px 20px 10px; border-bottom:1px solid #2A3942; flex-shrink:0; }
  #pedido-header h2 { color:#E9EDEF; font-size:15px; font-weight:700; }
  #pedido-header p  { color:#8696A0; font-size:12px; margin-top:3px; }
  #pedido-items { overflow-y:auto; flex:1; padding:10px 16px; }
  #pedido-items::-webkit-scrollbar { width:3px; }
  #pedido-items::-webkit-scrollbar-thumb { background:#2A3942; border-radius:3px; }
  .pedido-item { display:flex; align-items:center; justify-content:space-between; background:#1E2D36; border-radius:12px; padding:10px 14px; margin-bottom:8px; gap:10px; }
  .pedido-sec-label { color:#8696A0; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; padding:2px 2px 8px; }
  .pedido-add-section { background:#131F26; border-radius:12px; padding:10px 12px 8px; margin-bottom:4px; }
  .pedido-add-grid { display:flex; flex-direction:column; gap:6px; }
  .pedido-add-chip { display:flex; align-items:center; gap:8px; padding:7px 10px; background:#1E2D36; border-radius:10px; }
  .pedido-add-nome { color:#C8D4DA; font-size:13px; flex:1; }
  .pedido-add-preco { color:#8696A0; font-size:12px; flex-shrink:0; }
  .pedido-add-btn { width:30px; height:30px; border-radius:50%; border:none; background:#00A884; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; user-select:none; -webkit-user-select:none; line-height:1; }
  .pedido-add-btn:active { background:#007a62; }
  .pedido-item-nome { color:#E9EDEF; font-size:14px; flex:1; }
  .pedido-item-preco { color:#8696A0; font-size:12px; }
  .pedido-qty { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .pedido-qty button { width:30px; height:30px; border-radius:50%; border:none; background:#2A3942; color:#E9EDEF; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; user-select:none; -webkit-user-select:none; transition:background .12s; }
  .pedido-qty button:active { background:#3D4A50; }
  .pedido-qty span { color:#E9EDEF; font-size:15px; font-weight:700; min-width:20px; text-align:center; }
  #pedido-footer { padding:12px 16px 28px; border-top:1px solid #2A3942; flex-shrink:0; }
  #pedido-total-line { color:#E9EDEF; font-size:14px; margin-bottom:12px; text-align:center; }
  #pedido-total-line strong { color:#25D366; font-size:17px; }
  .pedido-btns { display:flex; gap:8px; }
  .pedido-btns button { flex:1; padding:12px; border:none; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; }
  #btn-pedido-salvar  { background:#25D366; color:#fff; }
  #btn-pedido-salvar:active  { background:#1da855; }
  #btn-pedido-editar { background:#1D3A4F; color:#53BDEB; }
  #btn-pedido-editar:active { background:#163040; }

  /* ── PEDIDO INLINE NO CHAT ── */
  .chat-pedido { background:#1A2E38; border:1px solid #2A3942; border-radius:12px; padding:12px 14px; margin-top:2px; min-width:210px; }
  .chat-pedido-titulo { color:#E9EDEF; font-weight:700; font-size:14px; margin-bottom:2px; }
  .chat-pedido-sub { color:#8696A0; font-size:11px; margin-bottom:8px; }
  .chat-pedido-bloco { margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #2A3942; }
  .chat-pedido-bloco:last-of-type { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .chat-pedido-bloco-num { color:#53BDEB; font-size:12px; font-weight:700; margin-bottom:4px; }
  .chat-pedido-item { color:#E9EDEF; font-size:13px; line-height:1.8; }
  .chat-pedido-total { color:#25D366; font-weight:700; font-size:13px; margin-top:4px; }
  .chat-pedido-btns { display:flex; gap:8px; margin-top:10px; }
  .chat-pedido-btn { flex:1; padding:9px 6px; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; user-select:none; -webkit-user-select:none; }
  .btn-cp-editar { background:#1D3A4F; color:#53BDEB; }
  .btn-cp-editar:active { background:#163040; }
  .btn-cp-excluir { background:#2D1515; color:#f87171; }
  .btn-cp-excluir:active { background:#3D1515; }
  #btn-pedido-cancelar { background:#3D4A50; color:#E9EDEF; }
  #btn-pedido-cancelar:active { background:#2A3942; }
  #btn-pedido-wpp { width:100%; padding:11px; border:none; border-radius:12px; background:#005C4B; color:#E9EDEF; font-weight:700; font-size:14px; cursor:pointer; margin-top:8px; display:none; }
  #btn-pedido-wpp:active { background:#004035; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-avatar">&#x1F47D;<div class="status-dot" id="statusDot"></div></div>
    <div class="header-info">
      <div class="header-name">𝕕𝕚𝕟𝕠 𝕚.𝕒 <span style="font-size:11px;color:#c75b24;font-weight:400;">&#x25CF; administrador</span></div>
      <div class="header-status" id="headerStatus">online</div>
    </div>
    <button id="voz-btn" onclick="toggleVoz()" aria-label="Voz" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:opacity .2s;">🔊</button>
    <button id="gear-btn" onclick="abrirCfg()" aria-label="Configurações">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- MODAL CONFIGURAÇÕES -->
  <div id="cfg-overlay" onclick="fecharCfgFora(event)">
    <div id="cfg-box">
      <h2>⚙️ Configurações</h2>
      <p id="cfg-model-label">Powered by <strong style="color:#25D366">Gemini 2.5 Flash</strong> — troca automática de chave no limite.</p>
      <div class="cfg-section-title">Chave da API (manual)</div>
      <div id="key-grid" class="key-grid"></div>
      <div id="cfg-key-label" style="color:#8696A0;font-size:11px;margin-top:-12px;margin-bottom:18px;text-align:center;"></div>
      <div class="cfg-section-title" style="margin-top:16px;">Chaves da API</div>
      <button onclick="mostrarGuiaChaves()" style="width:100%;padding:10px;background:#2A3942;color:#E9EDEF;border:none;border-radius:10px;font-size:13px;cursor:pointer;margin-bottom:10px;">🔑 Como adicionar mais chaves</button>
      <div id="key-guide" style="display:none;background:#1a2730;border-radius:10px;padding:12px;margin-bottom:14px;color:#E9EDEF;font-size:12px;line-height:1.7;"></div>
      <div class="cfg-section-title" style="margin-top:16px;">Diagnóstico</div>
      <button onclick="diagnosticar()" style="width:100%;padding:10px;background:#2A3942;color:#E9EDEF;border:none;border-radius:10px;font-size:13px;cursor:pointer;margin-bottom:10px;">🔍 Testar conexão com Gemini</button>
      <div id="diag-result" style="color:#8696A0;font-size:12px;text-align:center;min-height:18px;margin-bottom:16px;"></div>
      <div class="cfg-section-title" style="margin-top:16px;">Conversa</div>
      <button onclick="confirmarLimparConversa()" style="width:100%;padding:10px;background:#2D1515;color:#f87171;border:none;border-radius:10px;font-size:13px;cursor:pointer;margin-bottom:10px;">🗑️ Apagar todas as conversas</button>
      <div id="limpar-confirm" style="display:none;background:#1a1010;border-radius:10px;padding:12px;margin-bottom:14px;text-align:center;">
        <p style="color:#f87171;font-size:13px;margin-bottom:10px;">Apagar tudo? Isso não pode ser desfeito.</p>
        <div style="display:flex;gap:8px;">
          <button onclick="cancelarLimpar()" style="flex:1;padding:9px;background:#2A3942;color:#E9EDEF;border:none;border-radius:10px;font-size:13px;cursor:pointer;">Cancelar</button>
          <button onclick="limparConversa()" style="flex:1;padding:9px;background:#c0392b;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">Apagar tudo</button>
        </div>
      </div>
      <button id="cfg-close" onclick="fecharCfg()">Fechar</button>
    </div>
  </div>
  <!-- MODAL EDITAR PEDIDO -->
  <div id="pedido-overlay" onclick="fecharPedidoFora(event)">
    <div id="pedido-box">
      <div id="pedido-header">
        <h2>📋 Pedido de <span id="pedido-nome-cliente"></span></h2>
        <p id="pedido-subtitulo">Ajuste as quantidades e salve</p>
      </div>
      <div id="pedido-items"></div>
      <div id="pedido-footer">
        <div id="pedido-total-line">Total: <strong id="pedido-total-valor">R$ 0,00</strong></div>
        <div id="pedido-desconto-line" style="display:none;color:#f87171;font-size:12px;text-align:center;margin-top:-6px;margin-bottom:6px;"></div>
        <div class="pedido-btns">
          <button class="pedido-btns" id="btn-pedido-cancelar" onclick="fecharPedido()">✕ Fechar</button>
          <button class="pedido-btns" id="btn-pedido-editar" onclick="ativarEdicaoPedido()">✏️ Mudar Pedido</button>
          <button class="pedido-btns" id="btn-pedido-salvar" onclick="salvarPedido()">✅ Salvar</button>
        </div>
        <button id="btn-pedido-wpp" onclick="enviarComprovanteAlteracaoWpp()">📲 Enviar comprovante no WhatsApp</button>
      </div>
    </div>
  </div>

  <div id="wallpaper"></div>
  <div id="messages">
    <div class="date-pill"><span id="datePill"></span></div>
    <div id="typing" style="display:none;">
      <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>
  <div id="input-bar">
    <div id="input-wrap">
      <textarea id="msg-input" placeholder="Mensagem" autocomplete="off" rows="1"></textarea>
    </div>
    <button id="mic-btn" onclick="toggleMic()" aria-label="Microfone">🎤</button>
    <button id="send-btn" class="active" onclick="enviar()" aria-label="Enviar">&#x27A4;</button>
  </div>
</div>

// ── GEMINI API ──
const GEMINI_KEYS = __GEMINI_KEYS__;
let geminiKeyIndex = (() => { try { const s = localStorage.getItem("dino_gemini_key_idx"); return s !== null ? parseInt(s) : 0; } catch(e) { return 0; } })();
const GEMINI_MODELS = [
  { id: "gemini-2.5-flash", nome: "2.5 Flash" },
];
let geminiModelIndex = (() => { try { const s = localStorage.getItem("dino_gemini_model_idx"); return s !== null ? parseInt(s) : 0; } catch(e) { return 0; } })();
const GEMINI_MODEL = () => GEMINI_MODELS[geminiModelIndex].id;

async function geminiRequest(systemPrompt, mensagens) {
  let ultimoErro = "";
  for (let tentativa = 0; tentativa < GEMINI_KEYS.length; tentativa++) {
    const chave = GEMINI_KEYS[geminiKeyIndex];
    const url = "https://generativelanguage.googleapis.com/v1beta/models/" + GEMINI_MODEL() + ":generateContent";
    const contents = [];
    for (const m of mensagens) {
      contents.push({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] });
    }
    const body = {
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents,
      generationConfig: { temperature: 0.1, maxOutputTokens: 300 }
    };
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-goog-api-key": chave },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      const errCode = json?.error?.code || res.status;
      if (errCode === 429 || errCode === 401 || errCode === 403) {
        ultimoErro = "Chave " + (geminiKeyIndex+1) + ": " + (json?.error?.message || errCode);
        geminiKeyIndex = (geminiKeyIndex + 1) % GEMINI_KEYS.length;
        continue;
      }
      if (!res.ok || json?.error) return { erro: "Erro na API (" + errCode + "): " + (json?.error?.message || "") };
      const texto = json.candidates?.[0]?.content?.parts?.[0]?.text || "";
      if (!texto) {
        geminiKeyIndex = (geminiKeyIndex + 1) % GEMINI_KEYS.length;
        continue;
      }
      return { ok: true, texto };
    } catch(e) {
      return { erro: "Erro de conexão: " + e.message };
    }
  }
  return { erro: "Todas as chaves falharam com o modelo " + GEMINI_MODEL() + ".\n\nÚltimo erro: " + ultimoErro + "\n\nAdicione mais chaves em ⚙️ Configurações." };
}

const SB_H = { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" };

async function sbGet(table, filters) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?select=*";
  for (const [k,v] of Object.entries(filters||{})) url += "&" + k + "=eq." + encodeURIComponent(v);
  return (await fetch(url, { headers: SB_H })).json();
}
async function sbUpdate(table, match, data) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?";
  for (const [k,v] of Object.entries(match)) url += k + "=eq." + encodeURIComponent(v) + "&";
  return (await fetch(url, { method:"PATCH", headers:{...SB_H, Prefer:"return=representation"}, body:JSON.stringify(data) })).json();
}
async function sbInsert(table, data) {
  return (await fetch(SUPABASE_URL + "/rest/v1/" + table, { method:"POST", headers:{...SB_H, Prefer:"return=representation"}, body:JSON.stringify(data) })).json();
}
async function sbDelete(table, match) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?";
  for (const [k,v] of Object.entries(match)) url += k + "=eq." + encodeURIComponent(v) + "&";
  return fetch(url, { method:"DELETE", headers:{...SB_H, Prefer:"return=representation"} });
}

function salvarLocal() {
  if (restaurando) return;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      ts: Date.now(),
      historico,
      msgs: msgsSalvas
    }));
  } catch(e) {}
}

function carregarLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const dados = JSON.parse(raw);
    if (!dados.ts || Date.now() - dados.ts > DIAS_SALVAR * 86400000) {
      localStorage.removeItem(STORAGE_KEY);
      return false;
    }
    historico = dados.historico || [];
    msgsSalvas = dados.msgs || [];
    restaurando = true;
    for (const m of (dados.msgs || [])) {
      if (m.toast) addToast(m.texto, m.pagData || null);
      else {
        addMsg(m.role, m.texto, false, m.time);
        if (m.cancelado) {
          const bubbles = document.querySelectorAll(".bubble.bot");
          const last = bubbles[bubbles.length - 1];
          if (last) {
            const span = document.createElement("span");
            span.textContent = "Cancelado";
            span.style.cssText = "display:block;color:#f87171;font-size:11px;margin-top:6px;";
            last.appendChild(span);
          }
        }
      }
    }
    restaurando = false;
    return true;
  } catch(e) { restaurando = false; return false; }
}

function normStr(s) {
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

// Similaridade entre dois nomes (0 a 1)
function sim(a, b) {
  a = normStr(a); b = normStr(b);
  if (a === b) return 1;
  const pa = a.split(" ")[0], pb = b.split(" ")[0];
  if (pa === pb) return 0.95;
  if (b.includes(a) || a.includes(b)) return 0.9;
  // letras em comum no primeiro nome
  let comum = 0;
  for (const ch of pa) { if (pb.includes(ch)) comum++; }
  return comum / Math.max(pa.length, pb.length, 1);
}

// Retorna { exato:true, cliente } ou { exato:false, sugestoes:[] } ou null
function encontrarCliente(clientes, nome) {
  const n = normStr(nome);
  const norm = s => normStr(s);
  let c = clientes.find(x => norm(x.name) === n);
  if (c) return { exato:true, cliente:c };
  c = clientes.find(x => norm(x.name).startsWith(n));
  if (c) return { exato:true, cliente:c };
  c = clientes.find(x => norm(x.name).includes(n));
  if (c) return { exato:true, cliente:c };
  // fuzzy
  const ranked = clientes
    .map(x => ({ cliente:x, score:sim(nome, x.name) }))
    .filter(x => x.score >= 0.5)
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);
  if (ranked.length) return { exato:false, sugestoes:ranked.map(x=>x.cliente) };
  return null;
}

// ── PAGAMENTO (identico ao ADM) ──
async function executarPagamento(phone, val) {
  const dados = await sbGet("clientes", { phone });
  const c = Array.isArray(dados) ? dados[0] : null;
  if (!c) throw new Error("Cliente nao encontrado.");

  const novoSaldo = Number(c.debt||0) - val;
  const [cfgTk, cfgDi] = await Promise.all([
    sbGet("configs", { key:"ticket_valor_reais" }),
    sbGet("configs", { key:"diamante_valor_reais" }),
  ]);
  const vTk = cfgTk[0]?.value ? Number(cfgTk[0].value) : 0;
  const vDi = cfgDi[0]?.value ? Number(cfgDi[0].value) : 0;
  const acum   = Number(c.total_acumulado||0) + val;
  const novTk  = vTk > 0 ? Math.floor(acum / vTk) : 0;
  const sobra  = vTk > 0 ? acum % vTk : acum;
  const novDi  = vDi > 0 ? Math.floor(val / vDi) : 0;

  await sbUpdate("clientes", { phone }, {
    debt:            novoSaldo,
    tickets:         (Number(c.tickets||0))   + novTk,
    diamantes:       (Number(c.diamantes||0)) + novDi,
    total_acumulado: sobra,
  });

  const dh = dataHoraSP();
  const saldoTexto = novoSaldo > 0
    ? "Saldo devedor restante: R$ " + novoSaldo.toFixed(2).replace(".",",")
    : novoSaldo < 0
      ? "Credito a favor: R$ " + Math.abs(novoSaldo).toFixed(2).replace(".",",")
      : "Quitado";

  const miolo = "──────────────────\nCliente: " + c.name + "\nData/Hora: " + dh + "\nValor pago: R$ " + val.toFixed(2).replace(".",",") + "\n" + saldoTexto + "\n──────────────────";
  await sbInsert("notificacoes", { customer_phone:phone, tipo:"pagamento", valor:val, comprovante:miolo });
  clientesCache = null;
  return { nome:c.name, novoSaldo, saldoTexto, novTk, novDi };
}

// ── CONFIRMAR / CANCELAR ──
async function confirmarPendente() {
  if (!pendente) return;
  document.querySelectorAll(".confirm-btns").forEach(el => el.remove());

  // ── EXCLUIR PEDIDO ──
  if (pendente.tipo === "excluir_pedido") {
    const { pedido, cliente } = pendente;
    pendente = null;
    setStatus(true);
    document.getElementById("typing").style.display = "flex";
    rolar();
    try {
      const total = Number(pedido.total || 0);
      // Busca dados atuais do cliente
      const dados = await sbGet("clientes", { phone: cliente.phone });
      const c = Array.isArray(dados) ? dados[0] : null;
      if (!c) throw new Error("Cliente não encontrado.");
      const novoDebt = Number(c.debt || 0) - total;
      await sbUpdate("clientes", { phone: cliente.phone }, { debt: novoDebt });
      await sbDelete("pedidos", { id: pedido.id });
      clientesCache = null;
      document.getElementById("typing").style.display = "none";
      const saldoTexto = novoDebt > 0
        ? "Débito restante: R$ " + novoDebt.toFixed(2).replace(".",",")
        : novoDebt < 0
          ? "Crédito gerado: R$ " + Math.abs(novoDebt).toFixed(2).replace(".",",")
          : "Conta zerada";
      const msg = "🗑️ Pedido de " + cliente.name + " excluído.\n\nR$ " + total.toFixed(2).replace(".",",") + " creditado na conta.\n" + saldoTexto;
      addMsg("bot", msg);
      historico.push({ role:"assistant", content: msg });
      // Remove pedido da lista inline
      if (pedidosInline) {
        pedidosInline.rows = pedidosInline.rows.filter(r => r.id !== pedido.id);
      }
    } catch(e) {
      document.getElementById("typing").style.display = "none";
      addMsg("bot", "Erro ao excluir: " + e.message);
    } finally {
      setStatus(false);
      ocupado = false;
    }
    return;
  }

  const { cliente, valor, zerarCredito } = pendente;
  pendente = null;
  setStatus(true);
  document.getElementById("typing").style.display = "flex";
  rolar();
  try {
    if (zerarCredito) {
      await sbUpdate("clientes", { phone: cliente.phone }, { debt: 0 });
      clientesCache = null;
      document.getElementById("typing").style.display = "none";
      addToast("✅ Crédito zerado ♻️");
      historico.push({ role:"assistant", content:"Crédito zerado." });
    } else {
      const res = await executarPagamento(cliente.phone, valor);
      document.getElementById("typing").style.display = "none";
      addToast("♻️ comprovante", { phone: cliente.phone, nome: res.nome, valor, novoSaldo: res.novoSaldo, novTk: res.novTk, novDi: res.novDi });
      historico.push({ role:"assistant", content: "✅ " + res.nome });
    }
  } catch(e) {
    document.getElementById("typing").style.display = "none";
    addMsg("bot", "Erro: " + e.message);
  } finally {
    setStatus(false);
    ocupado = false;
  }
}

  pendenteSug = null;

}

// ── BYPASS POR REGEX (evita falhas da IA em casos óbvios) ──
function detectarPorRegex(texto) {
  const t = normStr(texto);

  // helper: extrai nome após preposição "de/do/da/dos/das/do/pra/para"
  function extrairNome(str) {
    const m = str.match(/\b(?:de|do|da|dos|das|pra|para)\s+([a-záàâãéêíóôõúç][a-záàâãéêíóôõúç\s]{1,40}?)(?:\s+de\s+\d|$)/i);
    return m ? m[1].trim() : "";
  }

  // ── COMPROVANTE(S) ──
  if (/comprovante[s]?|historico\s+de\s+pagamento[s]?/.test(t)) {
    const nome = extrairNome(t);
    const datas = [...texto.matchAll(/(\d{2}\/\d{2}\/\d{4})/g)].map(m => m[1]);
    const obj = { acao:"comprovantes", cliente: nome };
    if (datas[0]) obj.data_inicio = datas[0];
    if (datas[1]) obj.data_fim    = datas[1];
    return obj;
  }

  // ── PAGAMENTO: pagou / lança / quita / quitou / quitado / pago ──
  if (/\bpagou\b|\blanca\b|\blança\b|\bquita\b|\bquitou\b|\bquitado\b|\bpago\b/.test(t)) {
    // extrai valor (número)
    const mVal = texto.match(/\b(\d+(?:[.,]\d{1,2})?)\b/);
    const valor = mVal ? parseFloat(mVal[1].replace(",",".")) : 0;
    // extrai nome: pode vir antes ou depois do verbo
    const mNome = t.match(/^([a-záàâãéêíóôõúç][a-záàâãéêíóôõúç\s]{1,30}?)\s+(?:pagou|pago|quitou|quitado)/i)
                || t.match(/(?:de|do|da)\s+([a-záàâãéêíóôõúç][a-záàâãéêíóôõúç\s]{1,30}?)(?:\s|$)/i);
    const cliente = mNome ? mNome[1].trim() : "";
    return { acao:"pagamento", cliente, valor };
  }

  // ── DÍVIDA / DÉBITO / SALDO de alguém específico ──
  const temPessoa = /\b(?:de|do|da)\s+[a-záàâãéêíóôõúç]/.test(t);
  if (/d[ií]vida[s]?|d[eé]bito[s]?|saldo\s+(?:de|do|da)|quanto\s+(?:deve|ta\s+devendo|está\s+devendo)/.test(t) && temPessoa) {
    const nome = extrairNome(t);
    return { acao:"consulta", cliente: nome };
  }

  // ── LISTA DEVEDORES (sem nome específico) ──
  if (/d[ií]vida[s]?|d[eé]bito[s]?|devendo|devedor[es]?|quem\s+deve/.test(t) && !temPessoa) {
    return { acao:"lista_devedores" };
  }

  // ── LISTA CREDORES ──
  if (/cr[eé]dito[s]?/.test(t) && !temPessoa) {
    return { acao:"lista_credores" };
  }

  // ── QUEM TEM / FEZ PEDIDO ──
  if (/quem\s+(tem|fez|fiz|tinha|tinha|efetuou|realizou|mandou|colocou)?\s*pedido[s]?/.test(t) ||
      /pedido[s]?\s+(de\s+hoje|hoje|do\s+dia)/.test(t)) {
    const hoje = /hoje|do\s+dia|de\s+hoje/.test(t);
    return { acao:"lista_pedidos_clientes", hoje };
  }

  // ── PEDIDO: ver / editar / listar todos ──
  if (/\bpedidos?\b/.test(t)) {
    const nome = extrairNome(t);
    if (/\beditar\b|\balterar\b|\bmudar\b|\bmodificar\b|\batualizar\b/.test(t)) {
      return { acao:"editar_pedido", cliente: nome };
    }
    // "todos os pedidos", "listar pedidos", "mostrar pedidos", "historico"
    if (/\btodos\b|\blistar\b|\bhistorico\b|\bhist[oó]rico\b|\btodas\b/.test(t)) {
      return { acao:"listar_pedidos", cliente: nome };
    }
    if (/\bver\b|\bveja\b|\bmostr[ae]\b|\bqual\b|\bquais\b/.test(t)) {
      return { acao:"ver_pedido", cliente: nome };
    }
    // genérico: mencionou pedido + nome → ver
    if (nome) return { acao:"ver_pedido", cliente: nome };
  }

  return null; // deixa a IA decidir
}

// ── IA ──
async function detectarIntencao(texto) {
  // Tenta regex primeiro (mais rápido e confiável para casos claros)
  const regexResult = detectarPorRegex(texto);
  if (regexResult) return regexResult;

  // ── Saudações e respostas genéricas → responde localmente sem chamar a IA ──
  const t0 = normStr(texto);
  const saudacoes = /^(oi+|ola+|ol[aá]|hey|e a[ií]|ta a[ií]|ta ai|ta aqui|tudo bem|tudo bom|bom dia|boa tarde|boa noite|ok|certo|blz|beleza|valeu|obrigad[oa]|otimo|perfeito|entendi|sim|nao|nao entendi|teste|test)\.?!?$/;
  if (saudacoes.test(t0)) {
    const respostas = ["Olá! Como posso ajudar?","Oi! O que precisa?","Estou aqui.","Pode falar.","Oi!","Olá!"];
    return { acao:"outro", resposta: respostas[Math.floor(Math.random() * respostas.length)] };
  }

  const system = `Assistente do "O Rei da Coxinha". Identifica a intenção da mensagem.
Responda SOMENTE JSON puro, sem markdown.
Pagamento/quitação: {"acao":"pagamento","cliente":"NOME","valor":NUMERO}
Valor 0 se não mencionado ou "quitar/zerar": {"acao":"pagamento","cliente":"NOME","valor":0}
Consulta de saldo de UM cliente: {"acao":"consulta","cliente":"NOME"}
Listar TODOS devedores (sem nome): {"acao":"lista_devedores"}
Listar TODOS credores (sem nome): {"acao":"lista_credores"}
Comprovantes de cliente: {"acao":"comprovantes","cliente":"NOME","data_inicio":"DD/MM/AAAA","data_fim":"DD/MM/AAAA"}
Ver pedido de cliente: {"acao":"ver_pedido","cliente":"NOME"}
Editar/alterar pedido de cliente: {"acao":"editar_pedido","cliente":"NOME"}
Listar todos os pedidos de cliente: {"acao":"listar_pedidos","cliente":"NOME"}
Quem fez/tem pedido (todos ou hoje): {"acao":"lista_pedidos_clientes","hoje":false} ou {"acao":"lista_pedidos_clientes","hoje":true}
Outro: {"acao":"outro","resposta":"resposta curta"}
"cliente" deve ser nome de pessoa, nunca frase longa.
Erros de digitação: "duvida"="divida", "clente"="cliente", "creditu"="credito", "peddo"="pedido".`;

  try {
    // Envia só a mensagem atual — sem histórico (intenção é autocontida)
    const resultado = await geminiRequest(system, [{ role:"user", content:texto }]);
    if (resultado.erro) return { acao:"outro", resposta: resultado.erro };

    const raw = resultado.texto;
    const match = raw.match(/\{[\s\S]*\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      if (parsed.cliente && parsed.cliente.length > 40) {
        return { acao:"outro", resposta:"Nao entendi. Pode informar o nome do cliente?" };
      }
      return parsed;
    }
  } catch(e) {}
  return { acao:"outro", resposta:"Nao consegui processar. Tente novamente." };
}

// ── VERIFICAR SE RESPOSTA E ESCOLHA DE SUGESTAO ──
function resolverSugestao(texto, sugestoes) {
  const num = parseInt(texto.trim());
  if (!isNaN(num) && num >= 1 && num <= sugestoes.length) return sugestoes[num-1];
  return null;
}

// ── ENVIAR ──
async function enviar() {
  const input = document.getElementById("msg-input");
  const texto = input.value.trim();
  if (!texto) return;
  input.value = "";
  input.style.height = "auto";
  addMsg("user", texto);
  historico.push({ role:"user", content:texto });
  await processarTexto(texto);
}

async function processarTexto(texto) {

  // ── DETECTA LINK PIX COLADO ──────────────────────────────────
  // Aceita: "?39,90=18/04/26=12:58=Anderson=Gomes" ou URL completa
  const pixMatch = texto.match(/[?&]?(\d+[,\.]\d{2})=(\d{2}\/\d{2}\/\d{2,4})=(\d{2}:\d{2}(?::\d{2})?)=([A-Za-zÀ-ú]+)=([A-Za-zÀ-ú]+)/);
  if (pixMatch && !pendenteSug && !pendente && !ocupado) {
    const valorNum  = parseFloat(pixMatch[1].replace(',','.'));
    const data      = pixMatch[2];
    const hora      = pixMatch[3];
    const nomeUrl   = pixMatch[4] + ' ' + pixMatch[5];

    ocupado = true;
    setStatus(true);
    document.getElementById("typing").style.display = "flex";
    rolar();

    try {
      const clientes = await carregarClientes();
      document.getElementById("typing").style.display = "none";

      const resultado = encontrarCliente(clientes, nomeUrl);

      if (!resultado) {
        const resp = "Recebi o PIX de R$ " + valorNum.toFixed(2).replace('.',',') + " (" + data + " às " + hora + ").\nNão encontrei nenhum cliente com o nome \"" + nomeUrl + "\". Qual o nome correto?";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content: resp });
        pendenteSug = { acao:"pagamento_pix", sugestoes:[], valor:valorNum, data, hora, nomeUrl };
        ocupado = false; setStatus(false);
        return;
      }

      if (resultado.exato) {
        const c = resultado.cliente;
        const debtAtual = Number(c.debt||0);
        const novoSaldo = debtAtual - valorNum;
        const saldoDepois = novoSaldo > 0 ? "Saldo após: R$ " + novoSaldo.toFixed(2).replace('.',',') : novoSaldo < 0 ? "Crédito após: R$ " + Math.abs(novoSaldo).toFixed(2).replace('.',',') : "Conta quitada";
        pendente = { cliente:c, valor:valorNum, pixDados:{ data, hora, nomeUrl } };
        const msg = "💸 PIX recebido!\n\nRemetente: " + nomeUrl + "\nValor: R$ " + valorNum.toFixed(2).replace('.',',') + "\nData: " + data + " às " + hora + "\n\nRegistrar para " + c.name + "?\nDébito atual: R$ " + debtAtual.toFixed(2).replace('.',',') + "\n" + saldoDepois;
        addMsg("bot", msg, true);
        historico.push({ role:"assistant", content: msg });
        ocupado = true;
        setStatus(false);
        return;
      }

      // Fuzzy — mostra sugestões
      const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
      const resp = "💸 PIX de R$ " + valorNum.toFixed(2).replace('.',',') + " (" + data + " às " + hora + ")\nRemetente: " + nomeUrl + "\n\nNão achei esse cliente. Quem é?\n\n" + lista + "\n\nResponda com o número ou digite outro nome.";
      addMsg("bot", resp);
      historico.push({ role:"assistant", content: resp });
      pendenteSug = { acao:"pagamento_pix", sugestoes:resultado.sugestoes, valor:valorNum, data, hora, nomeUrl };
      ocupado = false; setStatus(false);
    } catch(e) {
      document.getElementById("typing").style.display = "none";
      addMsg("bot", "Erro ao processar PIX: " + e.message);
      ocupado = false; setStatus(false);
    }
    return;
  }

  // ── SE TINHA SUGESTÃO PIX PENDENTE ──────────────────────────
  if (pendenteSug && pendenteSug.acao === "pagamento_pix") {
    let escolha = resolverSugestao(texto, pendenteSug.sugestoes);

    // Se não escolheu número → trata como novo nome e busca no banco
    if (!escolha) {
      const clientes = await carregarClientes();
      const resultado = encontrarCliente(clientes, texto);
      if (resultado && resultado.exato) {
        escolha = resultado.cliente;
      } else if (resultado && !resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const { valor, data, hora, nomeUrl } = pendenteSug;
        const novaResp = "Não achei \"" + texto + "\" exato. Quem você quis dizer?\n\n" + lista + "\n\nResponda com o número ou outro nome.";
        pendenteSug = { acao:"pagamento_pix", sugestoes:resultado.sugestoes, valor, data, hora, nomeUrl };
        addMsg("bot", novaResp);
        historico.push({ role:"assistant", content:novaResp });
        ocupado = false; setStatus(false);
        return;
      } else {
        pendenteSug = null;
        const semResp = "Não encontrei nenhum cliente com esse nome.";
        addMsg("bot", semResp);
        historico.push({ role:"assistant", content:semResp });
        ocupado = false; setStatus(false);
        return;
      }
    }

    if (escolha) {
      const { valor, data, hora, nomeUrl } = pendenteSug;
      pendenteSug = null;
      const debtAtual = Number(escolha.debt||0);
      const novoSaldo = debtAtual - valor;
      const saldoDepois = novoSaldo > 0 ? "Saldo após: R$ " + novoSaldo.toFixed(2).replace('.',',') : novoSaldo < 0 ? "Crédito após: R$ " + Math.abs(novoSaldo).toFixed(2).replace('.',',') : "Conta quitada";
      pendente = { cliente:escolha, valor, pixDados:{ data, hora, nomeUrl } };
      const msg = "Confirmar pagamento?\n\n" + escolha.name + "\nValor: R$ " + valor.toFixed(2).replace('.',',') + "\nDébito atual: R$ " + debtAtual.toFixed(2).replace('.',',') + "\n" + saldoDepois;
      addMsg("bot", msg, true);
      historico.push({ role:"assistant", content: msg });
      ocupado = true;
      return;
    } else {
      pendenteSug = null;
      addMsg("bot", "Ok, cancelado.");
      historico.push({ role:"assistant", content:"Ok, cancelado." });
    }
  }

  if (pendenteSug) {
    // ── ESCOLHA DE PEDIDO (editar / excluir) ──
    if (pendenteSug.acao === "escolher_editar" || pendenteSug.acao === "escolher_excluir") {
      const num = parseInt(texto.trim());
      const { pedidos, cliente, cardapioArr, acao } = pendenteSug;
      if (isNaN(num) || num < 1 || num > pedidos.length) {
        const resp = "Digite um número de 1 a " + pedidos.length + ".";
        addMsg("bot", resp); historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }
      const pedidoEscolhido = pedidos[num - 1];
      pendenteSug = null;
      document.getElementById("typing").style.display = "none";
      if (acao === "escolher_editar") {
        const itens = parsePedidoTexto(pedidoEscolhido.items, cardapioArr);
        pedidoAtual = { cliente, pedido: pedidoEscolhido, itens: JSON.parse(JSON.stringify(itens)), cardapio: cardapioArr, editavel: true };
        renderModalPedido();
        document.getElementById("pedido-overlay").classList.add("open");
      } else {
        const total = Number(pedidoEscolhido.total || 0);
        const msg = "Excluir Pedido " + num + " de " + cliente.name + "?\n\nTotal: R$ " + total.toFixed(2).replace(".",",") + " será creditado na conta.\n\nEssa ação não pode ser desfeita.";
        pendente = { tipo: "excluir_pedido", pedido: pedidoEscolhido, cliente };
        addMsg("bot", msg, true);
        historico.push({ role:"assistant", content: msg });
        ocupado = true;
      }
      return;
    }

    let escolha = resolverSugestao(texto, pendenteSug.sugestoes);

    // Se não escolheu número → trata como novo nome e busca no banco
    if (!escolha) {
      const clientes = await carregarClientes();
      const resultado = encontrarCliente(clientes, texto);
      if (resultado && resultado.exato) {
        escolha = resultado.cliente;
      } else if (resultado && !resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const novaResp = "Não achei \"" + texto + "\" exato. Quem você quis dizer?\n\n" + lista + "\n\nResponda com o número ou outro nome.";
        pendenteSug = { sugestoes:resultado.sugestoes, valor: pendenteSug.valor };
        addMsg("bot", novaResp);
        historico.push({ role:"assistant", content:novaResp });
        ocupado = false; setStatus(false);
        return;
      } else {
        pendenteSug = null;
        const semResp = "Não encontrei nenhum cliente com esse nome.";
        addMsg("bot", semResp);
        historico.push({ role:"assistant", content:semResp });
        ocupado = false; setStatus(false);
        return;
      }
    }

    if (escolha) {

      // ── Rota: comprovantes ──
      if (pendenteSug.acao === "comprovantes") {
        const { data_inicio, data_fim } = pendenteSug;
        pendenteSug = null;
        ocupado = true;
        setStatus(true);
        document.getElementById("typing").style.display = "flex";
        rolar();
        try {
          let url = SUPABASE_URL + "/rest/v1/pagamentos_pix?select=*&phone=eq." + encodeURIComponent(escolha.phone) + "&order=created_at.asc";
          if (data_inicio) { const [d,m,a] = data_inicio.split("/"); url += "&data_pix=gte." + encodeURIComponent(a+"-"+m+"-"+d); }
          if (data_fim)    { const [d,m,a] = data_fim.split("/");    url += "&data_pix=lte." + encodeURIComponent(a+"-"+m+"-"+d); }
          const comprovantes = await (await fetch(url, { headers: SB_H })).json();
          document.getElementById("typing").style.display = "none";
          if (!Array.isArray(comprovantes) || comprovantes.length === 0) {
            const resp = "Nenhum comprovante encontrado para " + escolha.name + (data_inicio ? " no período informado" : "") + ".";
            addMsg("bot", resp); historico.push({ role:"assistant", content:resp });
          } else {
            const total = comprovantes.reduce((acc, c) => acc + Number(c.valor||0), 0);
            const lista = comprovantes.map(c => {
              const emissor = c.adm ? "ᵉᵐⁱˢˢᵒʳ* ᵃᵈᵐⁱⁿ" : "ᵉᵐⁱˢˢᵒʳ* ᶜˡⁱᵉⁿᵗᵉ";
              return "──────────────────\n👤 Cliente: " + escolha.name + "\n📅 Data/Hora: " + c.data_pix + ", " + c.hora_pix + "\n💰 Valor pago: R$ " + Number(c.valor).toFixed(2).replace(".",",") + "\n" + emissor + "\n──────────────────";
            }).join("\n");
            const resp = "Comprovantes de " + escolha.name + " (" + comprovantes.length + "):\n\n" + lista + "\n\nTotal: R$ " + total.toFixed(2).replace(".",",");
            addMsg("bot", resp); historico.push({ role:"assistant", content:resp });
          }
        } catch(e) {
          document.getElementById("typing").style.display = "none";
          addMsg("bot", "Erro: " + e.message);
        } finally { ocupado = false; setStatus(false); }
        return;
      }

      // ── Rota: ver_pedido / editar_pedido ──
      if (pendenteSug.acao === "ver_pedido" || pendenteSug.acao === "editar_pedido") {
        pendenteSug = null;
        ocupado = false; setStatus(false);
        await mostrarPedidosChat(escolha);
        return;
      }

      // ── Rota: listar_pedidos ──
      if (pendenteSug.acao === "listar_pedidos") {
        pendenteSug = null;
        ocupado = false; setStatus(false);
        await mostrarPedidosChat(escolha);
        return;
      }

      // ── Rota: pagamento ──
      const valor = pendenteSug.valor;
      pendenteSug = null;
      const debtAtual = Number(escolha.debt||0);
      const valorFinal = (!valor || valor <= 0) ? debtAtual : valor;
      if (debtAtual < 0 && valorFinal <= 0) {
        const creditoFmt = "R$ " + Math.abs(debtAtual).toFixed(2).replace(".",",");
        const msg = escolha.name + " está com " + creditoFmt + " de crédito. Quer zerar a conta?";
        pendente = { cliente:escolha, valor:0, zerarCredito:true };
        addMsg("bot", msg, true);
        historico.push({ role:"assistant", content:msg });
        ocupado = true;
        return;
      }
      if (valorFinal <= 0) {
        addMsg("bot", escolha.name + " não tem débito em aberto.");
        return;
      }
      const novoSaldo = debtAtual - valorFinal;
      const saldoDepois = novoSaldo > 0 ? "Saldo apos: R$ " + novoSaldo.toFixed(2).replace(".",",") : novoSaldo < 0 ? "Credito apos: R$ " + Math.abs(novoSaldo).toFixed(2).replace(".",",") : "Conta quitada";
      pendente = { cliente:escolha, valor:valorFinal };
      const msg = "Confirmar pagamento?\n\n" + escolha.name + "\nValor: R$ " + valorFinal.toFixed(2).replace(".",",") + "\nDebito atual: R$ " + debtAtual.toFixed(2).replace(".",",") + "\n" + saldoDepois;
      addMsg("bot", msg, true);
      historico.push({ role:"assistant", content:msg });
      ocupado = true;
      return;
    } else {
      pendenteSug = null;
      // cai no fluxo normal abaixo
    }
  }

  if (ocupado) return;
  ocupado = true;
  setStatus(true);
  document.getElementById("typing").style.display = "flex";
  rolar();

  try {
    const intencao = await detectarIntencao(texto);

    if (intencao.acao === "pagamento") {
      const clientes = await carregarClientes();
      const resultado = encontrarCliente(clientes, intencao.cliente || "");
      const valor = Number(intencao.valor) || 0;

      if (!resultado) {
        const resp = "Nao encontrei nenhum cliente com o nome \"" + intencao.cliente + "\". Verifique o nome e tente novamente.";
        document.getElementById("typing").style.display = "none";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      // Fuzzy — mostra sugestoes
      if (!resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const resp = "Não achei \"" + intencao.cliente + "\" exato. Quem você quis dizer?\n\n" + lista + "\n\nResponda com o número ou digite outro nome.";
        document.getElementById("typing").style.display = "none";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        pendenteSug = { sugestoes:resultado.sugestoes, valor };
        ocupado = false; setStatus(false);
        return;
      }

      // Achou exato
      const cliente = resultado.cliente;
      const debtAtual = Number(cliente.debt||0);
      const valorFinal = (!valor || valor <= 0) ? debtAtual : valor;

      // Cliente tem crédito (saldo negativo) — perguntar se quer zerar
      if (debtAtual < 0 && valorFinal <= 0) {
        const creditoFmt = "R$ " + Math.abs(debtAtual).toFixed(2).replace(".",",");
        const msg = cliente.name + " está com " + creditoFmt + " de crédito. Quer zerar a conta?";
        pendente = { cliente, valor:0, zerarCredito:true };
        document.getElementById("typing").style.display = "none";
        addMsg("bot", msg, true);
        historico.push({ role:"assistant", content:msg });
        return;
      }

      if (valorFinal <= 0) {
        const resp = cliente.name + " não tem débito em aberto.";
        document.getElementById("typing").style.display = "none";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      const novoSaldo = debtAtual - valorFinal;
      const saldoDepois = novoSaldo > 0 ? "Saldo apos: R$ " + novoSaldo.toFixed(2).replace(".",",") : novoSaldo < 0 ? "Credito apos: R$ " + Math.abs(novoSaldo).toFixed(2).replace(".",",") : "Conta quitada";
      pendente = { cliente, valor:valorFinal };
      document.getElementById("typing").style.display = "none";
      const msg = "Confirmar pagamento?\n\n" + cliente.name + "\nValor: R$ " + valorFinal.toFixed(2).replace(".",",") + "\nDebito atual: R$ " + debtAtual.toFixed(2).replace(".",",") + "\n" + saldoDepois;
      addMsg("bot", msg, true);
      historico.push({ role:"assistant", content:msg });
      // ocupado = true ate confirmar/cancelar

    } else if (intencao.acao === "consulta") {
      const clientes = await carregarClientes();
      const nomeQuery = intencao.cliente || "";
      const resultado = nomeQuery ? encontrarCliente(clientes, nomeQuery) : null;
      document.getElementById("typing").style.display = "none";

      if (!resultado) {
        const resp = nomeQuery
          ? "Nao encontrei nenhum cliente com o nome \"" + nomeQuery + "\"."
          : "Pode me dizer o nome do cliente?";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      if (!resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const resp = "Nao achei \"" + nomeQuery + "\" exato. Voce quis dizer?\n\n" + lista + "\n\nResponda com o nome ou numero.";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        pendenteSug = { sugestoes:resultado.sugestoes, valor:0 };
        ocupado = false; setStatus(false);
        return;
      }

      const c = resultado.cliente;
      const debt = Number(c.debt||0);
      const saldoLinha = debt > 0
        ? "Debito: R$ " + debt.toFixed(2).replace(".",",")
        : debt < 0
          ? "Credito: R$ " + Math.abs(debt).toFixed(2).replace(".",",")
          : "Sem debito";
      const resp = c.name + "\n" + saldoLinha + "\nTickets: " + (c.tickets||0) + "  Diamantes: " + (c.diamantes||0);
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);

    } else if (intencao.acao === "lista_devedores") {
      const clientes = await carregarClientes();
      const lista = clientes
        .filter(c => Number(c.debt||0) > 0)
        .sort((a,b) => Number(b.debt) - Number(a.debt));
      document.getElementById("typing").style.display = "none";
      let resp;
      if (!lista.length) {
        resp = "Nenhum cliente com dívida no momento! 🎉";
      } else {
        resp = "Clientes com dívida (" + lista.length + "):\n\n" +
          lista.map((c,i) => (i+1) + ". " + c.name + " — R$ " + Number(c.debt).toFixed(2).replace(".",",")).join("\n");
      }
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);

    } else if (intencao.acao === "lista_credores") {
      const clientes = await carregarClientes();
      const lista = clientes
        .filter(c => Number(c.debt||0) < 0)
        .sort((a,b) => Number(a.debt) - Number(b.debt));
      document.getElementById("typing").style.display = "none";
      let resp;
      if (!lista.length) {
        resp = "Nenhum cliente com crédito no momento.";
      } else {
        resp = "Clientes com crédito (" + lista.length + "):\n\n" +
          lista.map((c,i) => (i+1) + ". " + c.name + " — R$ " + Math.abs(Number(c.debt)).toFixed(2).replace(".",",")).join("\n");
      }
      addMsg("bot", resp);
      historico.push({ role:"assistant", content:resp });
      ocupado = false; setStatus(false);

    } else if (intencao.acao === "comprovantes") {
      const clientes = await carregarClientes();
      const nomeQuery = intencao.cliente || "";
      const resultado = nomeQuery ? encontrarCliente(clientes, nomeQuery) : null;
      document.getElementById("typing").style.display = "none";

      if (!resultado) {
        const resp = nomeQuery
          ? "Nao encontrei nenhum cliente com o nome \"" + nomeQuery + "\"."
          : "Pode me dizer o nome do cliente?";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        ocupado = false; setStatus(false);
        return;
      }

      if (!resultado.exato) {
        const lista = resultado.sugestoes.map((s,i) => (i+1) + ". " + s.name).join("\n");
        const resp = "Nao achei \"" + nomeQuery + "\" exato. Voce quis dizer?\n\n" + lista + "\n\nResponda com o nome ou numero.";
        addMsg("bot", resp);
        historico.push({ role:"assistant", content:resp });
        pendenteSug = { acao:"comprovantes", sugestoes:resultado.sugestoes, data_inicio:intencao.data_inicio||null, data_fim:intencao.data_fim||null };
        ocupado = false; setStatus(false);
        return;
      }

      const cliente = resultado.cliente;

      // Busca comprovantes na tabela pagamentos_pix

// ── RECEBER PIX DA URL (?valor=data=hora=nome=sobrenome) ──
function lerPixDaURL() {
  const search = decodeURIComponent(window.location.search);
  if (!search) return null;
  const raw = search.substring(1);
  const partes = raw.split('=');
  if (partes.length !== 5) return null;
  const valorRaw  = partes[0];
  const data      = partes[1];
  const hora      = partes[2];
  const nome      = partes[3];
  const sobrenome = partes[4];
  if (valorRaw.includes('R$')) return null;
  if (!nome.trim() || !sobrenome.trim()) return null;
  const valorNum = parseFloat(valorRaw.replace(/\./g,'').replace(',','.'));
  if (isNaN(valorNum) || valorNum <= 0) return null;
  return {
    valor:    valorNum,
    valorFmt: 'R$ ' + valorNum.toFixed(2).replace('.',','),
    data,
    hora,
    remetente: nome + ' ' + sobrenome
  };
}

// Extrai linhas de cupom/crédito do texto do pedido e seus valores de desconto
function extrairLinhasExtras(texto) {
  const extras = [];
  for (const linha of (texto || "").split("\n")) {
    if (linha.startsWith("🏷️") || linha.startsWith("💳")) {
      const m = linha.match(/-\s*R?\$?\s*(\d+(?:[.,]\d{1,2})?)/);
      const desconto = m ? parseFloat(m[1].replace(",", ".")) : 0;
      extras.push({ linha: linha.trim(), desconto });
    }
  }
  return extras;
}

// Converte o texto do cliente.html para array [{name, price, quantity, categoria}]
function parsePedidoTexto(texto, cardapio) {
  const itens = [];
  const linhas = (texto || "").split("\n");
  for (const linha of linhas) {
    // Pular separadores e metadados (cupom, crédito)
    if (!linha.trim() || linha.startsWith("———") || linha.startsWith("🏷️") || linha.startsWith("💳")) continue;
    // Formato: [emoji] Nx Nome  (ex: "🍗 2x Coxinha" ou "2x Coxinha")
    const match = linha.match(/^(?:🍗|🥐|✅)?\s*(\d+)x\s+(.+)$/);
    if (!match) continue;
    const quantity = parseInt(match[1]);
    const name = match[2].trim();
    // Busca preço no cardápio pelo nome
    const prod = cardapio.find(p => (p.name || "").trim() === name);
    const price = prod ? Number(prod.price || 0) : 0;
    const categoria = prod ? (prod.categoria || "") : "";
    const tipo = prod ? (prod.tipo || "") : "";
    itens.push({ name, price, quantity, categoria, tipo });
  }
  return itens;
}

// Converte array de itens de volta pro formato texto do cliente.html
function itensToPedidoTexto(itens) {
  let fritos = "";
  let crus = "";
  for (const item of itens) {
    const qty = Number(item.quantity || item.qty || item.quantidade || 0);
    if (qty <= 0) continue;
    const nome = item.name || item.nome || "Item";
    const tipoEmoji = item.tipo === "quente" ? "🍗" : item.tipo === "fria" ? "🥐" : "✅";
    const linha = `${tipoEmoji} ${qty}x ${nome}\n`;
    if (item.categoria === "crus") crus += linha;
    else fritos += linha;
  }
  let texto = "";
  if (fritos) texto += "———————🔥fritos🔥———————\n" + fritos;
  if (crus)   texto += "———————❄️ crus ❄️———————\n" + crus;
  return texto;
}

        '<div class="pedido-qty"><span id="qty-' + idx + '">' + qty + '</span></div>';
      container.appendChild(div);
    });
    atualizarTotalPedido();
    return;
  }

  // ── MODO EDIÇÃO ──
  const noOrder     = itens.filter(i => Number(i.quantity || i.qty || i.quantidade || 0) > 0);
  const disponiveis = itens.filter(i => Number(i.quantity || i.qty || i.quantidade || 0) === 0);

  // Seção ADICIONAR (chips compactos no topo)
  if (disponiveis.length > 0) {
    const secAdd = document.createElement("div");
    secAdd.className = "pedido-add-section";
    secAdd.innerHTML = '<div class="pedido-sec-label">➕ Adicionar</div>';
    const grid = document.createElement("div");
    grid.className = "pedido-add-grid";
    disponiveis.forEach(item => {
      const idx = itens.indexOf(item);
      const nome = item.name || item.nome || "Item";
      const preco = Number(item.price || item.preco || 0);
      const chip = document.createElement("div");
      chip.className = "pedido-add-chip";
      chip.innerHTML =
        '<div class="pedido-add-nome">' + nome + '</div>' +
        '<div class="pedido-add-preco">R$ ' + preco.toFixed(2).replace(".",",") + '</div>' +
        '<button class="pedido-add-btn" onclick="adicionarItem(' + idx + ')">＋</button>';
      grid.appendChild(chip);
    });
    secAdd.appendChild(grid);
    container.appendChild(secAdd);
  }

  // Separador
  if (noOrder.length > 0) {
    const sep = document.createElement("div");
    sep.className = "pedido-sec-label";
    sep.style.marginTop = disponiveis.length > 0 ? "14px" : "0";
    sep.textContent = "🛒 No pedido";
    container.appendChild(sep);

    noOrder.forEach(item => {
      const idx = itens.indexOf(item);
      const nome  = item.name || item.nome || "Item";
      const preco = Number(item.price || item.preco || 0);
      const qty   = Number(item.quantity || item.qty || item.quantidade || 0);
      const div = document.createElement("div");
      div.className = "pedido-item";
      div.innerHTML =
        '<div><div class="pedido-item-nome">' + nome + '</div>' +
        '<div class="pedido-item-preco">R$ ' + preco.toFixed(2).replace(".",",") + ' cada</div></div>' +
        '<div class="pedido-qty">' +
          '<button onclick="alterarQty(' + idx + ',-1)">−</button>' +
          '<span id="qty-' + idx + '">' + qty + '</span>' +
          '<button onclick="alterarQty(' + idx + ',1)">+</button>' +
        '</div>';
      container.appendChild(div);
    });
  } else {
    const vazio = document.createElement("p");
    vazio.style.cssText = "color:#8696A0;text-align:center;padding:14px 0 4px;font-size:13px;";
    vazio.textContent = "Nenhum item no pedido ainda.";
    container.appendChild(vazio);
  }

  atualizarTotalPedido();
}

function adicionarItem(idx) {
  if (!pedidoAtual) return;
  const item = pedidoAtual.itens[idx];
  const chaveQty = item.quantity !== undefined ? "quantity" : item.qty !== undefined ? "qty" : "quantidade";
  item[chaveQty] = 1;
  renderModalPedido(); // re-renderiza para mover o chip para "No pedido"
}

function alterarQty(idx, delta) {
  if (!pedidoAtual) return;
  const item = pedidoAtual.itens[idx];
  const chaveQty = item.quantity !== undefined ? "quantity" : item.qty !== undefined ? "qty" : "quantidade";
  const atual = Number(item[chaveQty] || item.quantity || item.qty || item.quantidade || 1);
  const novo = Math.max(0, atual + delta);
  item[chaveQty] = novo;
  // Se chegou a 0, re-renderiza para mover o item de volta pra seção "Adicionar"
  if (novo === 0) {
    renderModalPedido();
    return;
  }
  const el = document.getElementById("qty-" + idx);
  if (el) el.textContent = novo;
  atualizarTotalPedido();
}

function atualizarTotalPedido() {
  if (!pedidoAtual) return;
  const totalBruto = pedidoAtual.itens.reduce((acc, item) => {
    const qty   = Number(item.quantity || item.qty || item.quantidade || 0);
    const preco = Number(item.price || item.preco || 0);
    return acc + qty * preco;
  }, 0);
  const extras = extrairLinhasExtras(pedidoAtual.pedido.items);
  const totalDescontos = extras.reduce((acc, e) => acc + e.desconto, 0);
  const total = Math.max(0, totalBruto - totalDescontos);
  document.getElementById("pedido-total-valor").textContent = "R$ " + total.toFixed(2).replace(".",",");
  // Mostra linha de desconto se houver cupom/crédito
  const descontoEl = document.getElementById("pedido-desconto-line");
  if (descontoEl) {
    if (totalDescontos > 0) {
      const labels = extras.map(e => e.linha.split(":")[0]).join(", ");
      descontoEl.textContent = labels + ": −R$ " + totalDescontos.toFixed(2).replace(".",",");
      descontoEl.style.display = "block";
    } else {
      descontoEl.style.display = "none";
    }
  }
  pedidoAtual._novoTotal = total;
  pedidoAtual._totalDescontos = totalDescontos;
  pedidoAtual._extras = extras;
}

async function salvarPedido() {
  if (!pedidoAtual || !pedidoAtual.editavel) return;
  const { cliente, pedido, itens } = pedidoAtual;

  // Remove itens com qty 0
  const itensFiltrados = itens.filter(item => Number(item.quantity || item.qty || item.quantidade || 0) > 0);
  const novoTotal = itensFiltrados.reduce((acc, item) => {
    return acc + Number(item.quantity || item.qty || item.quantidade || 0) * Number(item.price || item.preco || 0);
  }, 0);

  document.getElementById("btn-pedido-salvar").textContent = "Salvando...";
  document.getElementById("btn-pedido-salvar").disabled = true;

  try {
    const extras = extrairLinhasExtras(pedido.items);
    const totalDescontos = extras.reduce((acc, e) => acc + e.desconto, 0);
    const novoTotalComDesconto = Math.max(0, novoTotal - totalDescontos);

    // ── Calcula diferença e ajusta debt do cliente ──
    const totalAntigo = Number(pedido.total || 0);
    const diferenca = totalAntigo - novoTotalComDesconto; // positivo = devolver crédito, negativo = cobrar mais

    // Preserva linhas de cupom/crédito no texto salvo
    const extrasTexto = extras.length > 0 ? extras.map(e => e.linha).join("\n") + "\n" : "";
    const novoTexto = itensToPedidoTexto(itensFiltrados) + extrasTexto;

    await sbUpdate("pedidos", { id: pedido.id }, {
      items: novoTexto,
      total: novoTotalComDesconto
    });

    let novoDebt = null;
    if (Math.abs(diferenca) >= 0.01) {
      // Busca debt atual direto do banco (evita valor stale do cache)
      const cliAtual = await sbGet("clientes", { phone: cliente.phone });
      const debtFresh = Number((Array.isArray(cliAtual) ? cliAtual[0] : cliAtual)?.debt || 0);
      novoDebt = debtFresh - diferenca;
      await sbUpdate("clientes", { phone: cliente.phone }, { debt: novoDebt });
      clientesCache = null;
      cliente.debt = novoDebt;
    }

    pedidoAtual.pedido.items = novoTexto;
    pedidoAtual.pedido.total = novoTotalComDesconto;
    pedidoAtual._novoTotal = novoTotalComDesconto;

    document.getElementById("btn-pedido-salvar").textContent = "✅ Salvo!";
    document.getElementById("btn-pedido-salvar").style.background = "#1da855";
    document.getElementById("btn-pedido-wpp").style.display = "block";

    const resumo = formatarResumoItens(itensFiltrados);
    let linhaAjuste = "";
    if (novoDebt !== null) {
      if (diferenca >= 0.01) {
        linhaAjuste = "\n💚 −R$ " + diferenca.toFixed(2).replace(".",",") + " na conta";
      } else if (diferenca <= -0.01) {
        linhaAjuste = "\n⚠️ +R$ " + Math.abs(diferenca).toFixed(2).replace(".",",") + " na conta";
      }
      const saldoFinal = novoDebt > 0
        ? "\nDébito atual: R$ " + novoDebt.toFixed(2).replace(".",",")
        : novoDebt < 0
          ? "\nCrédito a favor: R$ " + Math.abs(novoDebt).toFixed(2).replace(".",",")
          : "\nConta quitada ✅";
      linhaAjuste += saldoFinal;
    }

    const msgBot = "✅ Pedido de " + cliente.name + " atualizado!\n\n" + resumo + "\nTotal: R$ " + novoTotalComDesconto.toFixed(2).replace(".",",") + linhaAjuste;
    addMsg("bot", msgBot);
    historico.push({ role:"assistant", content: msgBot });

    setTimeout(() => {
      if (document.getElementById("btn-pedido-salvar")) {
        document.getElementById("btn-pedido-salvar").textContent = "✅ Salvar";
        document.getElementById("btn-pedido-salvar").style.background = "#25D366";
        document.getElementById("btn-pedido-salvar").disabled = false;
      }
    }, 2000);

  } catch(e) {
    document.getElementById("btn-pedido-salvar").textContent = "✅ Salvar";
    document.getElementById("btn-pedido-salvar").disabled = false;
    addMsg("bot", "Erro ao salvar pedido: " + e.message);
  }
}

function formatarResumoItens(itens) {
  return itens.map(item => {
    const qty  = Number(item.quantity || item.qty || item.quantidade || 0);
    const nome = item.name || item.nome || "Item";
    return qty + "x " + nome;
  }).join("\n") + "\n";
}

  if (!pedidoAtual) return;

}

function addPedidoCard(cliente, rows, cardapioArr) {
  pedidosInline = { cliente, rows, cardapioArr };
  const t = agora();
  const temVarios = rows.length > 1;
  const row = document.createElement("div");
  row.className = "msg-row bot";

  let conteudo = `<div class="chat-pedido-titulo">📋 Pedido de ${cliente.name}</div>
    <div class="chat-pedido-sub">${temVarios ? rows.length + " pedidos encontrados" : "Pedido mais recente"}</div>`;

  if (temVarios) {
    rows.forEach((pedido, idx) => {
      const itens = parsePedidoTexto(pedido.items, cardapioArr);
      const total = Number(pedido.total || 0);
      conteudo += `<div class="chat-pedido-bloco">
        <div class="chat-pedido-bloco-num">Pedido ${idx+1}</div>
        ${itens.map(i => `<div class="chat-pedido-item">${Number(i.quantity||i.qty||i.quantidade||1)}x : ${i.name||i.nome||"Item"}</div>`).join("")}
        <div class="chat-pedido-total">Total: R$ ${total.toFixed(2).replace(".",",")}</div>
      </div>`;
    });
  } else {
    const itens = parsePedidoTexto(rows[0].items, cardapioArr);
    const total = Number(rows[0].total || 0);
    conteudo += itens.map(i =>
      `<div class="chat-pedido-item">${Number(i.quantity||i.qty||i.quantidade||1)}x : ${i.name||i.nome||"Item"}</div>`
    ).join("") + `<div class="chat-pedido-total">Total: R$ ${total.toFixed(2).replace(".",",")}</div>`;
  }

  conteudo += `<div class="chat-pedido-btns">
    <button class="chat-pedido-btn btn-cp-editar" onclick="editarPedidoInline()">✏️ Editar</button>
    <button class="chat-pedido-btn btn-cp-excluir" onclick="excluirPedidoInline()">🗑️ Excluir</button>
  </div>`;

  row.innerHTML = `<div class="bubble bot">
    <span class="bubble-meta-wrap"><span class="bubble-time">${t}</span></span>
    <div class="chat-pedido">${conteudo}</div>
  </div>`;
  msgs().insertBefore(row, document.getElementById("typing"));
  rolar();
}

async function mostrarPedidosChat(cliente) {
  try {
    const cardapio = await (await fetch(SUPABASE_URL + "/rest/v1/cardapio?select=*&available=eq.true", { headers: SB_H })).json();
    const cardapioArr = Array.isArray(cardapio) ? cardapio : [];
    const url = SUPABASE_URL + "/rest/v1/pedidos?select=*&customer_phone=eq." +
      encodeURIComponent(cliente.phone) + "&order=created_at.desc";
    const rows = await (await fetch(url, { headers: SB_H })).json();
    document.getElementById("typing").style.display = "none";
    if (!Array.isArray(rows) || rows.length === 0) {
      const msg = "Nenhum pedido encontrado para " + cliente.name + ".";
      addMsg("bot", msg); historico.push({ role:"assistant", content: msg });
      return;
    }
    // filtra só pedidos com itens
    const validos = rows.filter(r => parsePedidoTexto(r.items, cardapioArr).length > 0);
    if (!validos.length) {
      const msg = "Pedidos de " + cliente.name + " não têm itens registrados.";
      addMsg("bot", msg); historico.push({ role:"assistant", content: msg });
      return;
    }
    addPedidoCard(cliente, validos, cardapioArr);
  } catch(e) {
    document.getElementById("typing").style.display = "none";
    addMsg("bot", "Erro ao buscar pedidos: " + e.message);
  }
}

function editarPedidoInline() {
  if (!pedidosInline) return;
  const { rows, cardapioArr, cliente } = pedidosInline;
  if (rows.length === 1) {
    const itens = parsePedidoTexto(rows[0].items, cardapioArr);

    const lista = rows.map((r, i) => (i+1) + ". Pedido " + (i+1) + " — R$ " + Number(r.total||0).toFixed(2).replace(".",",")).join("\n");

    addMsg("bot", resp);
    historico.push({ role:"assistant", content: resp });

}

function excluirPedidoInline() {
  if (!pedidosInline) return;

// ── TTS GEMINI ──────────────────────────────────────────────────
let vozAtiva = true;
let audioCtx = null;
let ttsQueue = [];
let ttsRodando = false;

function getAudioCtx() {
  if (!audioCtx || audioCtx.state === "closed")
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function limparParaFala(texto) {
  return texto
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FEFF}]/gu, "")
    .replace(/[➖─━]/g, "")
    .replace(/\*+([^*]*)\*+/g, "$1")
    .replace(/https?:\/\/\S+/g, "")
    .replace(/[\n\r]+/g, ". ")
    .replace(/\s+/g, " ")
    .trim();
}

async function processarFilaTTS() {
  if (ttsRodando || ttsQueue.length === 0) return;
  ttsRodando = true;
  const texto = ttsQueue.shift();

  // Tenta todas as chaves antes de desistir
  for (let tentativa = 0; tentativa < GEMINI_KEYS.length; tentativa++) {
    const chave = GEMINI_KEYS[geminiKeyIndex];
    try {
      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent",
        {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-goog-api-key": chave },
          body: JSON.stringify({
            contents: [{ parts: [{ text: texto }] }],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Dipper" } } }
            }
          })
        }
      );
      const json = await res.json();
      const errCode = json?.error?.code || res.status;
      if (errCode === 429 || errCode === 401 || errCode === 403) {
        // Chave esgotada — troca só a chave de voz
        geminiKeyIndex = (geminiKeyIndex + 1) % GEMINI_KEYS.length;
        continue;
      }
      const b64 = json?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if (!b64) break; // resposta inválida, desiste silenciosamente

      const bin = atob(b64);
      const ctx = getAudioCtx();
      const n = bin.length / 2;
      const buf = ctx.createBuffer(1, n, 24000);
      const ch  = buf.getChannelData(0);
      for (let i = 0; i < n; i++) {
        const lo = bin.charCodeAt(i * 2) & 0xFF;
        const hi = bin.charCodeAt(i * 2 + 1) & 0xFF;
        let s = (hi << 8) | lo;
        if (s >= 32768) s -= 65536;
        ch[i] = s / 32768;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.onended = () => { ttsRodando = false; processarFilaTTS(); };
      src.start();
      return; // sucesso — sai do loop
    } catch(e) {
      break; // erro de rede, desiste
    }
  }
  // Todas as chaves falharam ou erro — continua fila silenciosamente
  ttsRodando = false;
  processarFilaTTS();
}

function falarTexto(texto) {
  if (!vozAtiva) return;
  const limpo = limparParaFala(texto);
  if (!limpo || limpo.length < 3) return;
  ttsQueue.push(limpo);
  processarFilaTTS();
}

function toggleVoz() {
  vozAtiva = !vozAtiva;
  const btn = document.getElementById("voz-btn");
  if (btn) { btn.textContent = vozAtiva ? "🔊" : "🔇"; btn.style.opacity = vozAtiva ? "1" : "0.4"; }
  if (!vozAtiva) ttsQueue = [];
}


// ── MICROFONE (Speech Recognition) ──────────────────────────────
let reconhecimento = null;
let micAtivo = false;

function toggleMic() {
  if (micAtivo) {
    pararMic();
  } else {
    iniciarMic();
  }
}

function iniciarMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addMsg("bot", "Seu navegador não suporta reconhecimento de voz. Tente pelo Chrome.");
    return;
  }
  reconhecimento = new SR();
  reconhecimento.lang = "pt-BR";
  reconhecimento.continuous = true;
  reconhecimento.interimResults = true;

  const input = document.getElementById("msg-input");
  const btn   = document.getElementById("mic-btn");
  let textoBase = input.value; // preserva o que já tinha digitado

  reconhecimento.onstart = () => {
    micAtivo = true;
    btn.classList.add("gravando");
    btn.textContent = "⏹️";
    if (!textoBase.endsWith(" ") && textoBase.length > 0) textoBase += " ";
  };

  reconhecimento.onresult = (e) => {
    let interim = "";
    let final   = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (final) textoBase += final;
    input.value = textoBase + interim;
    // Ajusta altura do textarea
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  };

  reconhecimento.onerror = (e) => {
    if (e.error !== "aborted") pararMic();
  };

  reconhecimento.onend = () => {
    pararMic();
  };

  reconhecimento.start();
}

function pararMic() {
  micAtivo = false;
  const btn = document.getElementById("mic-btn");
  btn.classList.remove("gravando");
  btn.textContent = "🎤";
  if (reconhecimento) {
    try { reconhecimento.stop(); } catch(e) {}
    reconhecimento = null;
  }
}
